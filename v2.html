<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><meta charset="utf-8"><title>World Cup Pool</title><link rel="stylesheet" href="styles.css"><style>body{max-width:900px;margin:auto}.card{background:#0d1524;border:1px solid #263653;border-radius:16px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.badge{display:inline-block;border:1px solid #263653;border-radius:999px;padding:3px 8px;margin:3px;font-size:12px}.out{text-decoration:line-through;opacity:.45;color:#94a3b8}.take{border-color:#f97316;background:#1c1917}.muted{color:#94a3b8}.bar{height:8px;background:#1e293b;border-radius:99px;overflow:hidden}.fill{height:100%;background:#22c55e}table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid #1e293b;padding:7px;text-align:left}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><h1>World Cup 2026 Takeover Pool</h1><div class=muted>Rebuilt logic: losers eliminated, spread-cover takeovers tracked, simulator uses alive teams only.</div><div class=card><button onclick="render()">Run Simulator</button></div><div class=grid><div class=card><h2>Daily Recap</h2><div id=recap></div></div><div class=card><h2>If tournament ended today</h2><div id=insights></div></div></div><div class=card><h2>Takeover History</h2><div id=history></div></div><div class=card><h2>Championship Probability</h2><div id=odds></div></div><div class=card><h2>Simulator</h2><div id=simulator></div></div><div class=card><h2>Current Owners / Teams</h2><div id=owners></div></div><div class=card><h2>Round of 16 Bracket</h2><div id=bracket></div></div><script>const games=[['Canada','Baxter','Morocco','Nolan',-0.5,0,3],['Paraguay','Whelan','France','Knox',1.5,null,null],['Brazil','Gal','Norway','Knox',-0.5,null,null],['Mexico','Merc','England','McCartney',0,null,null],['Spain','Whelan','Portugal','Roynan',0.5,null,null],['United States','Merc','Belgium','Dolan',0,null,null],['Argentina','J. Schwartz','Egypt','Joe',-1.5,null,null],['Switzerland','E. Schwartz','Colombia','Baxter',0.5,null,null]].map(x=>({home:x[0],ho:x[1],away:x[2],ao:x[3],line:x[4],hs:x[5],as:x[6]}));const histOwners={Baxter:['Canada','Colombia'],Nolan:['Morocco'],Whelan:['Paraguay','Spain'],Knox:['France','Norway'],Gal:['Brazil'],Merc:['Mexico','United States'],McCartney:['England'],Roynan:['Portugal'],Dolan:['Belgium'],'J. Schwartz':['Argentina'],Joe:['Egypt'],'E. Schwartz':['Switzerland']};const strength={Argentina:96,Brazil:94,France:93,Spain:92,England:90,Portugal:88,Belgium:82,Colombia:80,Switzerland:78,'United States':76,Mexico:75,Morocco:72,Norway:71,Egypt:65,Paraguay:63,Canada:61};const baseTakeovers=[['England','Joe','McCartney','England -1.5 | DR Congo +1.5','England 2-1','DR Congo covered. McCartney took over England.'],['Belgium','J. Schwartz','Dolan','Belgium -0.5 | Senegal +0.5','Belgium 3-2 AET','Senegal covered at full time. Dolan took over Belgium.'],['Argentina','McCartney','J. Schwartz','Argentina -2.5 | Cape Verde +2.5','Argentina 3-2','Cape Verde covered. J. Schwartz took over Argentina.']];function owner(g,t){return t===g.home?g.ho:g.ao}function result(g){if(g.hs==null||g.as==null)return null;let w=g.hs>g.as?g.home:g.away;let fav=g.line<0?g.home:g.line>0?g.away:null;let dog=g.line<0?g.away:g.line>0?g.home:null;let o=owner(g,w),ev=null;if(fav&&w===fav){let cover=fav===g.home?g.hs+g.line>g.as:g.as-g.line>g.hs;if(!cover){o=owner(g,dog);ev=[fav,owner(g,fav),o,`${g.home} ${g.line} | ${g.away} ${-g.line}`,`${g.home} ${g.hs}-${g.as} ${g.away}`,`${dog} covered. ${o} takes over ${fav}.`]}}return{winner:w,owner:o,loser:w===g.home?g.away:g.home,event:ev}}function alive(){let a=[];games.forEach(g=>{let r=result(g);r?a.push([r.winner,r.owner]):(a.push([g.home,g.ho]),a.push([g.away,g.ao]))});return a}function takeovers(){let t=baseTakeovers.slice();games.forEach(g=>{let r=result(g);if(r&&r.event)t.push(r.event)});return t}function cards(){let live=new Set(alive().map(x=>x[0])),m={};Object.entries(histOwners).forEach(([o,ts])=>{m[o]={live:[],out:[]};ts.forEach(t=>(live.has(t)?m[o].live:m[o].out).push(t))});alive().forEach(([t,o])=>{m[o]??={live:[],out:[]};if(!m[o].live.includes(t))m[o].live.push(t);m[o].out=m[o].out.filter(x=>x!==t)});return m}function wp(a,b){let x=(strength[a]||60)/((strength[a]||60)+(strength[b]||60));return Math.max(.15,Math.min(.85,x))}function sim(n=4000){let base=alive().map(([t,o])=>({t,o})),owners=[...new Set(base.map(x=>x.o))],wins=Object.fromEntries(owners.map(o=>[o,0]));for(let i=0;i<n;i++){let t=base.slice();while(t.length>1){let nx=[];for(let j=0;j<t.length;j+=2){if(!t[j+1])nx.push(t[j]);else nx.push(Math.random()<wp(t[j].t,t[j+1].t)?t[j]:t[j+1])}t=nx}wins[t[0].o]++}let c=cards();return Object.entries(wins).map(([o,w])=>({o,p:w/n*100,teams:c[o]?.live||[]})).sort((a,b)=>b.p-a.p)}function project(){let t=alive().map(([team,own])=>({t:team,o:own})),h='';while(t.length>1){let nx=[],rows=[];for(let i=0;i<t.length;i+=2){if(!t[i+1]){nx.push(t[i]);continue}let p=wp(t[i].t,t[i+1].t)>=.5?t[i]:t[i+1];nx.push(p);rows.push(`${t[i].t} (${t[i].o}) vs ${t[i+1].t} (${t[i+1].o}) → <b>${p.t}</b> (${p.o})`)}h+=`<div class=card>${rows.join('<br>')}</div>`;t=nx}return h}function render(){let rows=sim(),lead=rows[0],t=takeovers(),c=cards(),out=Object.values(c).reduce((n,v)=>n+v.out.length,0);recap.innerHTML=`✔ ${games.filter(g=>g.hs!=null).length} finals loaded<br>🔁 ${t.length} takeovers<br>🏆 Leader: <b>${lead.o}</b> ${lead.p.toFixed(1)}%`;insights.innerHTML=`Alive teams: <b>${alive().length}</b><br>Eliminated shown: <b>${out}</b>`;history.innerHTML=t.map(x=>`<div class='card take'><b>🔁 ${x[0]}</b><br>${x[1]} → <b>${x[2]}</b><br><b>Spread:</b> ${x[3]}<br><b>Final:</b> ${x[4]}<br><b>Reason:</b> ${x[5]}</div>`).join('');odds.innerHTML=`<table><tr><th>Owner</th><th>Odds</th><th>Alive teams</th></tr>${rows.map(r=>`<tr><td><b>${r.o}</b></td><td>${r.p.toFixed(1)}%<div class=bar><div class=fill style='width:${r.p}%'></div></div></td><td>${r.teams.map(x=>`<span class=badge>${x}</span>`).join('')}</td></tr>`).join('')}</table>`;simulator.innerHTML=project();owners.innerHTML=Object.entries(c).sort().map(([o,v])=>`<div class=card><b>${o}</b><br>${v.live.map(x=>`<span class=badge>${x}</span>`).join('')}${v.out.map(x=>`<span class='badge out'><s>${x}</s> ❌</span>`).join('')}</div>`).join('');bracket.innerHTML=games.map(g=>`<div class=card><b>${g.home} vs ${g.away}</b><br>${g.home} <span class=badge>${g.ho}</span> ${g.hs??0} / ${g.away} <span class=badge>${g.ao}</span> ${g.as??0}${result(g)?`<br><span class=muted>Winner: ${result(g).winner} · Owner now: ${result(g).owner}</span>`:''}</div>`).join('')}render()</script></body></html>
