<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>World Cup Pool Live</title><link rel="stylesheet" href="styles.css"><style>body{max-width:1100px;margin:auto}.badge,.rank{display:inline-block;border:1px solid #263653;border-radius:999px;padding:3px 8px;margin:2px;font-size:12px}.rank{color:#93c5fd}.panel,.card{background:#0d1524;border:1px solid var(--border,#263653);border-radius:16px;padding:14px;margin:14px 0}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.big{font-size:26px;font-weight:900}.muted{color:#94a3b8}.team{display:flex;justify-content:space-between;border-top:1px solid #1e293b;padding:8px 0}.owner{display:block;color:#facc15;font-size:12px}.fav{color:#fdba74;font-weight:900}.dog{color:#86efac;font-weight:900}.pk{color:#93c5fd;font-weight:900}.take{border-color:#f97316!important;background:#1c1917!important}.bar{height:8px;background:#1e293b;border-radius:999px;overflow:hidden}.fill{height:100%;background:#22c55e}.spark{color:#93c5fd;letter-spacing:1px}.up{color:#86efac}.down{color:#fecaca}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #1e293b;padding:8px;text-align:left;vertical-align:top}@media(max-width:700px){.grid,.grid2{grid-template-columns:1fr}}</style></head><body><h1>World Cup 2026 Takeover Pool</h1><div class="muted">Fresh live build · Daily Recap restored · Championship Probability enhanced</div><div class="panel"><button onclick="refreshFromEspn()">Refresh ESPN Results</button> <button onclick="runOdds()">Re-run Pool Odds</button><div id="stamp" class="muted"></div><div id="status" class="muted">Ready.</div></div><div id="dashboard" class="grid"></div><div class="panel"><h2>Championship Probability</h2><div id="ownerOdds"></div></div><div class="grid2"><div class="panel"><h2>Daily Recap</h2><div id="dailyRecap"></div></div><div class="panel"><h2>If the tournament ended today</h2><div id="insights"></div></div></div><div class="panel"><h2>Round of 16 Bracket</h2><div id="bracket"></div></div><div class="panel"><h2>Current Owners / Alive Teams</h2><div id="ownersView"></div></div><div class="panel"><h2>Takeover History</h2><div id="takeoverHistory"></div></div><script>
const G=[['Canada','Baxter','Morocco','Nolan',-0.5,'Jul 4','1:00 PM EDT'],['Paraguay','Whelan','France','Knox',+1.5,'Jul 4','5:00 PM EDT'],['Brazil','Gal','Norway','Knox',-0.5,'Jul 5','4:00 PM EDT'],['Mexico','Merc','England','McCartney',0,'Jul 5','8:00 PM EDT',0,1],['Spain','Whelan','Portugal','Roynan',+0.5,'Jul 6','3:00 PM EDT'],['United States','Merc','Belgium','Dolan',0,'Jul 6','8:00 PM EDT',0,1],['Argentina','J. Schwartz','Egypt','Joe',-1.5,'Jul 7','12:00 PM EDT',1,0],['Switzerland','E. Schwartz','Colombia','Baxter',+0.5,'Jul 7','4:00 PM EDT']].map((x,i)=>({id:i,home:x[0],homeOwner:x[1],away:x[2],awayOwner:x[3],line:x[4],date:x[5],time:x[6],takeHome:!!x[7],takeAway:!!x[8],venue:'TBD'}));
const RANK={Argentina:1,Brazil:2,France:3,Spain:4,England:5,Portugal:6,Belgium:9,Colombia:10,Switzerland:11,'United States':12,Mexico:13,Morocco:16,Norway:17,Egypt:23,Paraguay:25,Canada:27};
const STRENGTH={Argentina:96,Brazil:94,France:93,Spain:92,England:90,Portugal:88,Belgium:82,Colombia:80,Switzerland:78,'United States':76,Mexico:75,Morocco:72,Norway:71,Egypt:65,Paraguay:63,Canada:61};
const TAKEOVERS=[{team:'England',from:'Joe',to:'McCartney',match:'England vs DR Congo',spread:'England -1.5 | DR Congo +1.5',final:'England 2-1',reason:'Favorite advanced but did not cover. DR Congo +1.5 covered.'},{team:'Belgium',from:'J. Schwartz',to:'Dolan',match:'Belgium vs Senegal',spread:'Belgium -0.5 | Senegal +0.5',final:'Belgium 3-2 AET',reason:'Senegal covered at full time. Belgium advanced in extra time.'},{team:'Argentina',from:'McCartney',to:'J. Schwartz',match:'Argentina vs Cape Verde',spread:'Argentina -2.5 | Cape Verde +2.5',final:'Argentina advanced',reason:'Favorite advanced but did not cover. Cape Verde +2.5 covered.'}];
let ESPN=JSON.parse(localStorage.getItem('wc_espn_results')||'{}'),last=localStorage.getItem('wc_last_espn')||'Never',cachedOdds=JSON.parse(localStorage.getItem('wc_current_odds')||'[]'),prevOdds=JSON.parse(localStorage.getItem('wc_previous_odds')||'[]'),hist=JSON.parse(localStorage.getItem('wc_odds_history')||'[]');
function canon(s){return String(s||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]/g,'').replace('usa','unitedstates').replace('unitedstatesofamerica','unitedstates')}function fmt(x){return x===0?'PK':x>0?'+'+x:x}function cls(x){return x===0?'pk':x<0?'fav':'dog'}function res(g){return ESPN[canon(g.home)+'_'+canon(g.away)]||ESPN[canon(g.away)+'_'+canon(g.home)]||null}function venue(g){return res(g)?.venue||g.venue}function meta(g){return res(g)?.dateText||`${g.date} · ${g.time}`}function score(g,s){let r=res(g);if(!r||r.homeScore==null)return '0';return canon(r.home)===canon(g.home)?(s==='home'?r.homeScore:r.awayScore):(s==='home'?r.awayScore:r.homeScore)}function stat(g){let r=res(g);return r?(r.completed?'Final':(r.status||'Live')):'Scheduled'}function rank(t){return RANK[t]?` <span class=rank>#${RANK[t]}</span>`:''}
function ownerMap(){let m={};G.forEach(g=>{(m[g.homeOwner]??=[]).push(g.home);(m[g.awayOwner]??=[]).push(g.away)});return m}function winProb(a,b){let x=(STRENGTH[a]||60)/((STRENGTH[a]||60)+(STRENGTH[b]||60));return Math.max(.15,Math.min(.85,x))}function simulate(n=6000){let owners=[...new Set(G.flatMap(g=>[g.homeOwner,g.awayOwner]))],wins=Object.fromEntries(owners.map(o=>[o,0]));for(let i=0;i<n;i++){let teams=G.map(g=>Math.random()<winProb(g.home,g.away)?{team:g.home,owner:g.homeOwner}:{team:g.away,owner:g.awayOwner});while(teams.length>1){let nx=[];for(let j=0;j<teams.length;j+=2)nx.push(Math.random()<winProb(teams[j].team,teams[j+1].team)?teams[j]:teams[j+1]);teams=nx}wins[teams[0].owner]++}return Object.entries(wins).map(([owner,w])=>({owner,pct:w/n*100,teams:(ownerMap()[owner]||[])})).sort((a,b)=>b.pct-a.pct)}function runOdds(){prevOdds=cachedOdds;localStorage.setItem('wc_previous_odds',JSON.stringify(prevOdds));cachedOdds=simulate();localStorage.setItem('wc_current_odds',JSON.stringify(cachedOdds));hist.push({time:new Date().toLocaleString(),odds:cachedOdds});if(hist.length>12)hist=hist.slice(-12);localStorage.setItem('wc_odds_history',JSON.stringify(hist));render()}
function delta(owner,pct){let p=(prevOdds.find(o=>o.owner===owner)||{}).pct;if(p==null)return{v:0,s:'—',c:''};let d=pct-p;return{v:d,s:d>0?'▲':d<0?'▼':'—',c:d>0?'up':d<0?'down':''}}function spark(o,pct){let vals=hist.map(h=>(h.odds.find(x=>x.owner===o)||{}).pct).filter(v=>v!=null);if(vals.length<2)vals=[Math.max(0,pct-4),pct-2,pct-1,pct];let chars='▁▂▃▄▅▆▇█',mn=Math.min(...vals),mx=Math.max(...vals);return vals.map(v=>chars[Math.round(((v-mn)/(mx-mn||1))*7)]).join('')}
function renderOdds(){let rows=cachedOdds.length?cachedOdds:(cachedOdds=simulate());ownerOdds.innerHTML=`<table><tr><th>Rank</th><th>Owner</th><th>Odds</th><th>Move</th><th>Trend</th><th>Teams Alive</th></tr>${rows.map((r,i)=>{let d=delta(r.owner,r.pct);return `<tr><td>#${i+1}</td><td><b>${r.owner}</b></td><td><b>${r.pct.toFixed(1)}%</b><div class=bar><div class=fill style="width:${r.pct}%"></div></div></td><td class=${d.c}>${d.s} ${d.v>=0?'+':''}${d.v.toFixed(1)}%</td><td class=spark>${spark(r.owner,r.pct)}</td><td>${r.teams.map(t=>`<span class="badge ${TAKEOVERS.some(x=>x.team===t)?'take':''}">${TAKEOVERS.some(x=>x.team===t)?'🔁 ':''}${t}</span>`).join('')}</td></tr>`}).join('')}</table>`}
function render(){stamp.textContent=last==='Never'?'World Cup: not refreshed yet':'World Cup updated: '+last;dashboard.innerHTML=`<div class=card><span>Round</span><div class=big>R16</div></div><div class=card><span>Takeovers</span><div class=big>${TAKEOVERS.length}</div></div><div class=card><span>PK Games</span><div class=big>${G.filter(g=>g.line===0).length}</div></div><div class=card><span>Spread Games</span><div class=big>${G.filter(g=>g.line!==0).length}</div></div>`;renderOdds();let rows=cachedOdds.length?cachedOdds:simulate(),top=rows[0];dailyRecap.innerHTML=`<div class=card>✔ ${G.filter(g=>res(g)?.completed).length} finals loaded<br>🟡 ${G.filter(g=>res(g)&&!res(g).completed).length} live games<br>🔁 ${TAKEOVERS.length} total takeovers<br>🏆 Leader: <b>${top.owner}</b> ${top.pct.toFixed(1)}%<br>${last}</div>`;let best=G.map(g=>[g.home,STRENGTH[g.home],g.homeOwner]).concat(G.map(g=>[g.away,STRENGTH[g.away],g.awayOwner])).sort((a,b)=>b[1]-a[1])[0];insights.innerHTML=`<div class=card>Current favorite: <b>${top.owner}</b><br>Most valuable team: <b>${best[0]}</b> (${best[2]})<br>Biggest takeover watch: favorite advancing without cover</div>`;bracket.innerHTML=G.map(g=>`<div class=card><div class=muted>${meta(g)} · ${stat(g)}<br>📍 ${venue(g)}</div><b>${g.home} vs ${g.away}</b><div class=team><span>${g.home}${rank(g.home)}<span class=owner>${g.homeOwner}</span></span><span><b>${score(g,'home')}</b> <span class=${cls(g.line)}>${fmt(g.line)}</span></span></div><div class=team><span>${g.away}${rank(g.away)}<span class=owner>${g.awayOwner}</span></span><span><b>${score(g,'away')}</b> <span class=${cls(-g.line)}>${fmt(-g.line)}</span></span></div></div>`).join('');ownersView.innerHTML=Object.entries(ownerMap()).sort().map(([o,ts])=>`<div class=card><b>${o}</b><br>${ts.map(t=>`<span class=badge>${t}</span>`).join('')}</div>`).join('');takeoverHistory.innerHTML=TAKEOVERS.map(t=>`<div class="card take"><b>🔁 ${t.team}</b><br>${t.from} → <b>${t.to}</b><br><b>Spread:</b> ${t.spread}<br><b>Final:</b> ${t.final}<br>${t.reason}</div>`).join('')}
async function refreshFromEspn(){status.textContent='Calling ESPN...';try{let r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260704-20260707&limit=100&_='+Date.now());let d=await r.json(),found=0;(d.events||[]).forEach(ev=>{let c=ev.competitions?.[0],cs=c?.competitors||[];if(cs.length<2)return;let h=cs.find(x=>x.homeAway==='home')||cs[0],a=cs.find(x=>x.homeAway==='away')||cs[1],v=c?.venue,venue=[v?.fullName,v?.address?.city,v?.address?.state].filter(Boolean).join(' — '),dt=new Date(ev.date);ESPN[canon(h.team.displayName)+'_'+canon(a.team.displayName)]={home:h.team.displayName,away:a.team.displayName,homeScore:h.score===''?null:Number(h.score),awayScore:a.score===''?null:Number(a.score),completed:!!ev.status?.type?.completed,status:ev.status?.type?.shortDetail||ev.status?.type?.description||'',venue,dateText:dt.toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})};found++});localStorage.setItem('wc_espn_results',JSON.stringify(ESPN));last=`${new Date().toLocaleString()} (${found} games loaded)`;localStorage.setItem('wc_last_espn',last);render();status.textContent='ESPN refresh confirmed.'}catch(e){status.textContent='ESPN failed: '+e.message}}render();
</script></body></html>
