<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>World Cup Pool Insights</title>
<link rel="stylesheet" href="styles.css" />
<style>
body{max-width:1100px;margin:0 auto}.top{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.link{color:#93c5fd;font-weight:900;text-decoration:none}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.wide{grid-column:1/-1}.insight-card{background:#0d1524;border:1px solid var(--border);border-radius:14px;padding:14px}.headline{font-size:28px;font-weight:900}.muted{color:#94a3b8}.good{color:#86efac}.bad{color:#fecaca}.hot{color:#fdba74}.row{border-top:1px solid #1e293b;padding:10px 0}.pill{display:inline-block;border:1px solid #263653;border-radius:999px;padding:3px 8px;margin:2px;font-size:12px}.takeover{border-color:#f97316;background:#1c1917}.timeline{border-left:3px solid #334155;padding-left:12px}.event{margin-bottom:14px}.sharebox{white-space:pre-wrap;background:#0b1220;border:1px solid #263653;border-radius:12px;padding:12px;font-family:ui-monospace,Menlo,monospace;font-size:13px}@media(max-width:700px){.grid{grid-template-columns:1fr}.headline{font-size:24px}}
</style>
</head>
<body>
<div class="top"><h1>Pool Insights</h1><a class="link" href="index.html">← Back to Pool App</a><button onclick="renderAll()">Refresh View</button></div>
<div class="sub">Pool impact meter · owner timeline · daily recap · shareable update</div>
<div class="grid">
  <div class="insight-card"><div class="muted">Pool Favorite</div><div id="favorite" class="headline">Loading</div><div id="favSub" class="muted"></div></div>
  <div class="insight-card"><div class="muted">Biggest Swing</div><div id="swing" class="headline hot">Loading</div><div id="swingSub" class="muted"></div></div>
  <div class="insight-card wide"><h2>Daily Recap</h2><div id="recap"></div></div>
  <div class="insight-card"><h2>Pool Impact Meter</h2><div id="impact"></div></div>
  <div class="insight-card"><h2>Owner Cards</h2><div id="ownerCards"></div></div>
  <div class="insight-card wide"><h2>Owner Timeline</h2><div id="timeline" class="timeline"></div></div>
  <div class="insight-card wide"><h2>One-click Share Text</h2><div id="share" class="sharebox"></div></div>
</div>
<script>
const games=[
['Canada','South Africa',-0.5,'Baxter','Joe','2026-06-28','3:00 PM EDT'],['Brazil','Japan',-0.5,'Gal','Larry','2026-06-29','1:00 PM EDT'],['Germany','Paraguay',-1.5,'Madden','Whelan','2026-06-29','4:30 PM EDT'],['Netherlands','Morocco',-0.5,'Nixon','Nolan','2026-06-29','9:00 PM EDT'],['Ivory Coast','Norway',0.5,'Larry','Knox','2026-06-30','1:00 PM EDT'],['France','Sweden',-1.5,'Knox','Whelan','2026-06-30','5:00 PM EDT'],['Mexico','Ecuador',-0.5,'Merc','Roynan','2026-06-30','9:00 PM EDT'],['England','DR Congo',-1.5,'Joe','McCartney','2026-07-01','12:00 PM EDT'],['Belgium','Senegal',-0.5,'J. Schwartz','Dolan','2026-07-01','4:00 PM EDT'],['United States','Bosnia & Herzegovina',-1.5,'Merc','Nolan','2026-07-01','8:00 PM EDT'],['Spain','Austria',-1.5,'Whelan','E. Schwartz','2026-07-02','3:00 PM EDT'],['Portugal','Croatia',-0.5,'Roynan','J. Schwartz','2026-07-02','7:00 PM EDT'],['Switzerland','Algeria',-0.5,'E. Schwartz','Madden','2026-07-02','11:00 PM EDT'],['Australia','Egypt',0,'Nixon','Joe','2026-07-03','2:00 PM EDT'],['Argentina','Cape Verde',-2.5,'McCartney','J. Schwartz','2026-07-03','6:00 PM EDT'],['Colombia','Ghana',-0.5,'Baxter','Baxter','2026-07-03','9:30 PM EDT']
].map(x=>({home:x[0],away:x[1],line:x[2],homeOwner:x[3],awayOwner:x[4],date:x[5],time:x[6]}));
const owners={Baxter:['Colombia','Canada','Ghana'],Dolan:['Senegal','Czech Republic','Saudi Arabia'],'E. Schwartz':['Switzerland','Austria','Haiti'],Gal:['Brazil','South Korea','New Zealand'],'J. Schwartz':['Belgium','Croatia','Cape Verde'],Joe:['England','Egypt','South Africa'],Knox:['France','Norway','Iraq'],Larry:['Japan','Ivory Coast','Jordan'],Madden:['Germany','Algeria','Tunisia'],McCartney:['Argentina','Türkiye','DR Congo'],Merc:['United States','Mexico','Curaçao'],Nixon:['Netherlands','Australia','Panama'],Nolan:['Morocco','Scotland','Bosnia & Herzegovina'],Roynan:['Portugal','Ecuador','Uzbekistan'],Tonrey:['Uruguay','Iran','Qatar'],Whelan:['Spain','Sweden','Paraguay']};
const strength={Argentina:96,Brazil:94,France:93,Spain:92,England:90,Portugal:88,Germany:87,Netherlands:86,Belgium:82,Colombia:80,Switzerland:78,UnitedStates:76,Mexico:75,Croatia:74,Japan:73,Senegal:72,Morocco:72,Norway:71,Austria:70,Ecuador:69,Algeria:68,Australia:67,Ghana:66,Egypt:65,Sweden:64,Paraguay:63,IvoryCoast:62,Canada:61,SouthAfrica:58,DRCongo:57,BosniaHerzegovina:56,CapeVerde:54};
const norm=s=>String(s||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]/g,''), key=t=>String(t).replace(/[^A-Za-z]/g,'');
let R=JSON.parse(localStorage.getItem('wc_espn_results')||'{}');
function res(g){return R[norm(g.home)+'_'+norm(g.away)]||R[norm(g.away)+'_'+norm(g.home)]||null}
function adv(g){let r=res(g);if(!r||!r.completed)return null;let hs=norm(r.home)===norm(g.home)?r.homeScore:r.awayScore,as=norm(r.home)===norm(g.home)?r.awayScore:r.homeScore,w=hs>as?g.home:g.away;if(g.line===0)return{team:w,owner:w===g.home?g.homeOwner:g.awayOwner,orig:w===g.home?g.homeOwner:g.awayOwner,score:`${hs}-${as}`,take:false};if(g.line<0){if(w!==g.home)return{team:g.away,owner:g.awayOwner,orig:g.awayOwner,score:`${hs}-${as}`,take:false};let cover=(hs+g.line)>as;return{team:g.home,owner:cover?g.homeOwner:g.awayOwner,orig:g.homeOwner,score:`${hs}-${as}`,take:!cover}}return{team:w,owner:w===g.home?g.homeOwner:g.awayOwner,orig:w===g.home?g.homeOwner:g.awayOwner,score:`${hs}-${as}`,take:false}}
function p(a,b){let x=(strength[key(a)]||55)/((strength[key(a)]||55)+(strength[key(b)]||55));return Math.max(.15,Math.min(.85,x))}
function simGame(g){let a=adv(g);if(a)return{team:a.team,owner:a.owner};let pr=p(g.home,g.away),r=Math.random();if(g.line<0){let cover=Math.min(.82,pr*(Math.abs(g.line)==.5?.92:.55)),no=Math.max(.04,Math.min(.25,pr-cover));if(r<cover)return{team:g.home,owner:g.homeOwner};if(r<cover+no)return{team:g.home,owner:g.awayOwner};return{team:g.away,owner:g.awayOwner}}return r<pr?{team:g.home,owner:g.homeOwner}:{team:g.away,owner:g.awayOwner}}
function odds(n=7000){let W=Object.fromEntries(Object.keys(owners).map(o=>[o,0]));for(let i=0;i<n;i++){let t=games.map(simGame);while(t.length>1){let nx=[];for(let j=0;j<t.length;j+=2)nx.push(!t[j+1]?t[j]:Math.random()<p(t[j].team,t[j+1].team)?t[j]:t[j+1]);t=nx}W[t[0].owner]++}return Object.entries(W).map(([owner,w])=>({owner,pct:w/n*100})).sort((a,b)=>b.pct-a.pct)}
function currentMap(){let map=Object.fromEntries(Object.keys(owners).map(o=>[o,[]]));Object.entries(owners).forEach(([o,ts])=>ts.forEach(t=>map[o].push({team:t,src:'draft'})));games.forEach(g=>{let a=adv(g);if(a){Object.keys(map).forEach(o=>map[o]=map[o].filter(x=>x.team!==a.team));map[a.owner].push({team:a.team,src:a.take?'takeover':'kept'});}});return map}
function renderAll(){R=JSON.parse(localStorage.getItem('wc_espn_results')||'{}');let O=odds(),top=O[0],done=games.map(g=>({g,a:adv(g)})).filter(x=>x.a),takes=done.filter(x=>x.a.take),map=currentMap();favorite.textContent=top.owner;favSub.textContent=top.pct.toFixed(1)+'% simulated chance to win';swing.textContent=takes[0]?`${takes[0].a.orig} → ${takes[0].a.owner}`:'No takeover yet';swingSub.textContent=takes[0]?`${takes[0].a.team} changed owner after ${takes[0].g.home} vs ${takes[0].g.away}`:'Waiting for a no-cover advancement.';recap.innerHTML=`<div class=row>✔ ${done.length} games completed</div><div class=row>🔁 ${takes.length} takeovers</div><div class=row>🏆 Current favorite: <b>${top.owner}</b> (${top.pct.toFixed(1)}%)</div><div class=row>📌 Last ESPN refresh: ${localStorage.getItem('wc_last_espn')||'Never'}</div>`;impact.innerHTML=games.filter(g=>!adv(g)).slice(0,5).map(g=>`<div class=row><b>${g.home} vs ${g.away}</b><br><span class=muted>${g.date} · ${g.time}</span><br><span class=good>${g.homeOwner}</span> benefits if ${g.home} covers · <span class=hot>${g.awayOwner}</span> benefits from upset/no-cover</div>`).join('')||'<div class=row>All listed games final.</div>';ownerCards.innerHTML=Object.entries(map).map(([o,ts])=>`<div class=row><b>${o}</b><br>${ts.map(x=>`<span class="pill ${x.src==='takeover'?'takeover':''}">${x.team}${x.src==='takeover'?' 🔁':''}</span>`).join('')}</div>`).join('');timeline.innerHTML=done.length?done.map(({g,a})=>`<div class=event><b>${g.date} · ${g.home} ${a.score} ${g.away}</b><br>${a.take?`🔁 ${a.owner} took over ${a.team} from ${a.orig}`:`✅ ${a.owner} retained/advanced with ${a.team}`}</div>`).join(''):'<div class=event>No completed games loaded yet.</div>';share.textContent=`World Cup Pool Update\n\nFavorite: ${top.owner} (${top.pct.toFixed(1)}%)\nCompleted games: ${done.length}\nTakeovers: ${takes.length}\n${takes.map(x=>`- ${x.a.team}: ${x.a.orig} → ${x.a.owner}`).join('\n')||'No takeovers yet'}\n\nOpen the pool app for full bracket and owner standings.`}
renderAll();
</script>
</body>
</html>
