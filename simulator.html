<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Simulator</title><link rel="stylesheet" href="styles.css"><style>.card{background:#0d1524;border:1px solid var(--border);border-radius:16px;padding:14px;margin:12px 0}.final{border-color:#22c55e}.live{border-color:#facc15}.row{display:grid;grid-template-columns:1fr auto;gap:10px;border-top:1px solid #1e293b;padding:8px 0}.owner{color:#facc15}.good{color:#86efac;font-weight:900}.orange{color:#fdba74;font-weight:900}.muted{color:#94a3b8}.day{font-size:24px;font-weight:900;margin-top:18px}.nav{display:flex;gap:8px;overflow:auto;position:sticky;top:0;background:var(--bg);padding:8px 0}.nav a{background:#1e293b;border:1px solid var(--border);border-radius:999px;color:#cbd5e1;padding:9px 12px;text-decoration:none;font-weight:800}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.mini{background:#0d1524;border:1px solid var(--border);border-radius:14px;padding:12px}.mini b{display:block;font-size:22px}@media(max-width:700px){.summary{grid-template-columns:1fr}}</style></head><body><h1>Simulator</h1><div class="sub">Uses final score plus full-time spread override for ownership. Version 2026-07-03.</div><div id="summary" class="summary"></div><div id="nav" class="nav"></div><div id="app"></div><script>
const M=[['2026-06-29','Monday, June 29','1:00 PM EDT','Brazil','Japan',-0.5,'Gal','Larry','Houston Stadium — Houston, TX'],['2026-06-29','Monday, June 29','4:30 PM EDT','Germany','Paraguay',-1.5,'Madden','Whelan','Boston Stadium — Foxborough, MA'],['2026-06-29','Monday, June 29','9:00 PM EDT','Netherlands','Morocco',-0.5,'Nixon','Nolan','Estadio Monterrey — Guadalupe, Mexico'],['2026-06-30','Tuesday, June 30','1:00 PM EDT','Ivory Coast','Norway',0.5,'Larry','Knox','TBD'],['2026-06-30','Tuesday, June 30','5:00 PM EDT','France','Sweden',-1.5,'Knox','Whelan','TBD'],['2026-06-30','Tuesday, June 30','9:00 PM EDT','Mexico','Ecuador',-0.5,'Merc','Roynan','TBD'],['2026-07-01','Wednesday, July 1','12:00 PM EDT','England','DR Congo',-1.5,'Joe','McCartney','TBD'],['2026-07-01','Wednesday, July 1','4:00 PM EDT','Belgium','Senegal',-0.5,'J. Schwartz','Dolan','TBD',true],['2026-07-01','Wednesday, July 1','8:00 PM EDT','United States','Bosnia and Herzegovina',-1.5,'Merc','Nolan','TBD'],['2026-07-02','Thursday, July 2','3:00 PM EDT','Spain','Austria',-1.5,'Whelan','E. Schwartz','TBD'],['2026-07-02','Thursday, July 2','7:00 PM EDT','Portugal','Croatia',-0.5,'Roynan','J. Schwartz','TBD'],['2026-07-02','Thursday, July 2','11:00 PM EDT','Switzerland','Algeria',-0.5,'E. Schwartz','Madden','TBD'],['2026-07-03','Friday, July 3','2:00 PM EDT','Australia','Egypt',0,'Nixon','Joe','TBD'],['2026-07-03','Friday, July 3','6:00 PM EDT','Argentina','Cape Verde',-2.5,'McCartney','J. Schwartz','TBD'],['2026-07-03','Friday, July 3','9:30 PM EDT','Colombia','Ghana',-0.5,'Baxter','Baxter','TBD']];
const R=JSON.parse(localStorage.getItem('wc_espn_results')||'{}');
function c(s){s=String(s||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]/g,'');let a={drc:'drcongo',cod:'drcongo',congodr:'drcongo',democraticrepublicofcongo:'drcongo',bosniaherzegovina:'bosniaandherzegovina',bosnia:'bosniaandherzegovina',usa:'unitedstates',unitedstatesofamerica:'unitedstates',cotedivoire:'ivorycoast'};return a[s]||s}
function r(m){let k1=c(m[3])+'_'+c(m[4]),k2=c(m[4])+'_'+c(m[3]);return R[k1]||R[k2]||Object.values(R).find(x=>(c(x.home)===c(m[3])&&c(x.away)===c(m[4]))||(c(x.home)===c(m[4])&&c(x.away)===c(m[3])))||null}
function v(m){let x=r(m);return (x&&x.venue)||m[8]||'TBD'}
function f(n){return n===0?'PK':n>0?'+'+n:String(n)}
function adv(m){let x=r(m);if(!x||!x.completed)return null;let hs=c(x.home)===c(m[3])?Number(x.homeScore):Number(x.awayScore),as=c(x.home)===c(m[3])?Number(x.awayScore):Number(x.homeScore),w=hs>as?m[3]:m[4],ft=!!m[9];if(m[5]===0)return{team:w,owner:w===m[3]?m[6]:m[7],orig:w===m[3]?m[6]:m[7],score:`${hs}-${as}`,reason:'PK line: no takeover'};if(m[5]<0){if(w!==m[3])return{team:m[4],owner:m[7],orig:m[7],score:`${hs}-${as}`,reason:'Underdog advanced'};let cover=ft?false:(hs-as)>Math.abs(m[5]);return{team:m[3],owner:cover?m[6]:m[7],orig:m[6],score:`${hs}-${as}`,reason:cover?'Favorite covered':'Underdog covered at full time'}}if(w===m[3])return{team:m[3],owner:m[6],orig:m[6],score:`${hs}-${as}`,reason:'Left side advanced'};let cover=ft?true:(as-hs)>Math.abs(m[5]);return{team:m[4],owner:cover?m[7]:m[6],orig:m[7],score:`${hs}-${as}`,reason:cover?'Underdog/right side covered':'No cover'}}
function card(m){let x=r(m),a=adv(m),live=x&&!x.completed&&x.homeScore!=null,hs=live?(c(x.home)===c(m[3])?x.homeScore:x.awayScore):'',as=live?(c(x.home)===c(m[3])?x.awayScore:x.homeScore):'';return `<div class="card ${a?'final':live?'live':''}"><b>${m[3]} vs ${m[4]}</b> <span class=muted>${m[2]}</span><div class=muted>📍 ${v(m)}</div><div class=row><span>${m[3]}<br><span class=owner>${m[6]}</span></span><b>${live?hs+' · ':''}${f(m[5])}</b></div><div class=row><span>${m[4]}<br><span class=owner>${m[7]}</span></span><b>${live?as+' · ':''}${f(-m[5])}</b></div>${a?`<div><span class=orange>Final ${a.score}:</span> ${a.team} advances. Owner: <b>${a.owner}</b>${a.owner!==a.orig?` <span class=orange>Takeover from ${a.orig}</span>`:''}<br><span class=muted>${a.reason}</span></div>`:live?`<div>Live ${hs}-${as}</div>`:`<div class=muted>Scheduled</div>`}</div>`}
function render(){let done=M.map(x=>({m:x,a:adv(x)})).filter(x=>x.a),takes=done.filter(x=>x.a.owner!==x.a.orig),latest=takes[takes.length-1];summary.innerHTML=`<div class=mini><b>${done.length}</b>Final games</div><div class=mini><b>${takes.length}</b>Takeovers</div><div class=mini><b>${latest?latest.a.team:'None'}</b>Latest takeover</div>`;let g={};M.forEach(x=>(g[x[0]]??=[]).push(x));let dates=Object.keys(g).sort();nav.innerHTML=dates.map(d=>`<a href="#d-${d}">${g[d][0][1]}</a>`).join('');app.innerHTML=dates.map(d=>`<section id="d-${d}"><div class=day>${g[d][0][1]}</div>${g[d].map(card).join('')}</section>`).join('')}
render();
</script></body></html>
