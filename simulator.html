<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>World Cup Simulator</title><link rel="stylesheet" href="styles.css"><style>.day-nav{display:flex;gap:8px;overflow-x:auto;margin:12px 0 16px;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:20}.day-nav a{background:#1e293b;color:#cbd5e1;border:1px solid var(--border);border-radius:999px;padding:9px 13px;font-weight:800;white-space:nowrap;text-decoration:none}.day-title{font-size:22px;font-weight:900;margin:12px 0}.venue{color:#cbd5e1;font-size:13px;margin-top:4px}.scenario-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:10px}.scenario{background:#0b1220;border:1px solid #263653;border-radius:12px;padding:10px}.scenario b{display:block;color:#fff;margin-bottom:5px}.impact{color:#fdba74;font-weight:900}.final{border-color:#22c55e}.live{border-color:#facc15}.winner{color:#86efac;font-weight:900}.takeover{color:#fdba74;font-weight:900}.summary{margin:12px 0}.summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.mini{background:#0d1524;border:1px solid var(--border);border-radius:14px;padding:12px}.mini b{display:block;font-size:20px}@media(max-width:700px){.scenario-grid,.summary-grid{grid-template-columns:1fr}}</style></head><body><h1>Simulator</h1><div class="sub">Final outcomes, ownership recalculation, and spread-based takeovers from ESPN results.</div><div class="summary"><div id="summary" class="summary-grid"></div></div><div class="day-nav" id="dayNav"></div><div id="content"></div><script>
const MATCHES=[['2026-06-29','Today — Monday, June 29','1:00 PM EDT','Brazil','Japan',-0.5,'Gal','Larry','Houston Stadium — Houston, TX'],['2026-06-29','Today — Monday, June 29','4:30 PM EDT','Germany','Paraguay',-1.5,'Madden','Whelan','Boston Stadium — Foxborough, MA'],['2026-06-29','Today — Monday, June 29','9:00 PM EDT','Netherlands','Morocco',-0.5,'Nixon','Nolan','Estadio Monterrey — Guadalupe, Mexico'],['2026-06-30','Tuesday, June 30','1:00 PM EDT','Ivory Coast','Norway',0.5,'Larry','Knox','TBD'],['2026-06-30','Tuesday, June 30','5:00 PM EDT','France','Sweden',-1.5,'Knox','Whelan','TBD'],['2026-06-30','Tuesday, June 30','9:00 PM EDT','Mexico','Ecuador',-0.5,'Merc','Roynan','TBD'],['2026-07-01','Wednesday, July 1','12:00 PM EDT','England','DR Congo',-1.5,'Joe','McCartney','TBD'],['2026-07-01','Wednesday, July 1','4:00 PM EDT','Belgium','Senegal',-0.5,'J. Schwartz','Dolan','TBD'],['2026-07-01','Wednesday, July 1','8:00 PM EDT','United States','Bosnia & Herzegovina',-1.5,'Merc','Nolan','TBD'],['2026-07-02','Thursday, July 2','3:00 PM EDT','Spain','Austria',-1.5,'Whelan','E. Schwartz','TBD'],['2026-07-02','Thursday, July 2','7:00 PM EDT','Portugal','Croatia',-0.5,'Roynan','J. Schwartz','TBD'],['2026-07-02','Thursday, July 2','11:00 PM EDT','Switzerland','Algeria',-0.5,'E. Schwartz','Madden','TBD'],['2026-07-03','Friday, July 3','2:00 PM EDT','Australia','Egypt',0,'Nixon','Joe','TBD'],['2026-07-03','Friday, July 3','6:00 PM EDT','Argentina','Cape Verde',-2.5,'McCartney','J. Schwartz','TBD'],['2026-07-03','Friday, July 3','9:30 PM EDT','Colombia','Ghana',-0.5,'Baxter','Baxter','TBD']];
function canon(s){s=String(s||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]/g,'');const a={congodr:'drcongo',congodemocraticrepublic:'drcongo',democraticrepublicofcongo:'drcongo',cod:'drcongo',drc:'drcongo',bosniaherzegovina:'bosniaandherzegovina',bosnia:'bosniaandherzegovina',usa:'unitedstates',unitedstatesofamerica:'unitedstates',cotedivoire:'ivorycoast',coteivoire:'ivorycoast'};return a[s]||s}
const results=JSON.parse(localStorage.getItem('wc_espn_results')||'{}');
function fmt(n){return n===0?'PK':n>0?'+'+n:String(n)}
function result(m){let k1=canon(m[3])+'_'+canon(m[4]),k2=canon(m[4])+'_'+canon(m[3]);return results[k1]||results[k2]||Object.values(results).find(r=>(canon(r.home)===canon(m[3])&&canon(r.away)===canon(m[4]))||(canon(r.home)===canon(m[4])&&canon(r.away)===canon(m[3])))||null}
function advance(m,r=result(m)){if(!r||!r.completed)return null;let hs=canon(r.home)===canon(m[3])?Number(r.homeScore):Number(r.awayScore),as=canon(r.home)===canon(m[3])?Number(r.awayScore):Number(r.homeScore),w=hs>as?m[3]:m[4];if(m[5]===0)return{team:w,owner:w===m[3]?m[6]:m[7],orig:w===m[3]?m[6]:m[7],score:`${hs}-${as}`,covered:true};if(m[5]<0){if(w!==m[3])return{team:m[4],owner:m[7],orig:m[7],score:`${hs}-${as}`,covered:true};let margin=hs-as,needed=Math.abs(m[5]),covered=margin>needed;return{team:m[3],owner:covered?m[6]:m[7],orig:m[6],score:`${hs}-${as}`,covered}}if(w===m[3])return{team:m[3],owner:m[6],orig:m[6],score:`${hs}-${as}`,covered:true};let margin=as-hs,needed=Math.abs(m[5]),covered=margin>needed;return{team:m[4],owner:covered?m[7]:m[6],orig:m[7],score:`${hs}-${as}`,covered}}
function scenarios(m){let h=m[3],a=m[4],l=m[5],ho=m[6],ao=m[7],abs=Math.abs(l);if(l===0)return`<div class=scenario><b>${h} advances</b>${ho} controls ${h}</div><div class=scenario><b>${a} advances</b>${ao} controls ${a}</div><div class=scenario><b>PK line</b>No spread inheritance.</div>`;if(l<0){let cover=abs===.5?`${h} wins by 1+`:`${h} wins by ${abs+.5}+`;let no=abs===.5?`${h} advances after draw/ET/PK`:`${h} wins but does not cover`;return`<div class=scenario><b>${cover}</b>${ho} keeps ${h}</div><div class=scenario><b>${no}</b>${ao} inherits ${h}</div><div class=scenario><b>${a} wins</b>${ao} keeps ${a}</div>`}return`<div class=scenario><b>${h} covers</b>${ho} controls ${h}</div><div class=scenario><b>${a} wins/covers</b>${ao} controls ${a}</div>`}
function card(m){let r=result(m),adv=advance(m,r);let live=r&&!r.completed&&r.homeScore!=null;let hs=live?(canon(r.home)===canon(m[3])?r.homeScore:r.awayScore):'',as=live?(canon(r.home)===canon(m[3])?r.awayScore:r.homeScore):'';return`<div class="match-card ${adv?'final':live?'live':''}"><div><span class="status-pill ${adv?'locked':''}">${adv?'FINAL':live?'LIVE':'LINE LOCKED'}</span><span class=status-pill>${m[2]}</span></div><div class=match-grid><div class="team-box ${adv&&adv.team===m[3]?'winner':''}"><div class=team-name>${m[3]}</div><div class=owner>Owner: ${m[6]}</div><div>${live?hs+' · ':''}${fmt(m[5])}</div></div><div class=line>vs</div><div class="team-box ${adv&&adv.team===m[4]?'winner':''}"><div class=team-name>${m[4]}</div><div class=owner>Owner: ${m[7]}</div><div>${live?as+' · ':''}${fmt(-m[5])}</div></div></div><div class=venue>📍 ${m[8]}</div>${adv?`<div class=result-panel><span class=impact>Final ${adv.score}:</span> ${adv.team} advances. Owner: <b>${adv.owner}</b>${adv.covered?'':' <span class=takeover>TAKEOVER from '+adv.orig+'</span>'}</div>`:live?`<div class=result-panel><span class=impact>Current ${hs}-${as}:</span> recalculates after final.</div>`:`<div class=scenario-grid>${scenarios(m)}</div>`}</div>`}
function render(){let done=MATCHES.map(m=>({m,adv:advance(m)})).filter(x=>x.adv),takes=done.filter(x=>x.adv.owner!==x.adv.orig);summary.innerHTML=`<div class=mini><b>${done.length}</b>Final games</div><div class=mini><b>${takes.length}</b>Takeovers</div><div class=mini><b>${takes.at(-1)?.adv.team||'None'}</b>Latest takeover</div>`;let groups={};MATCHES.forEach(m=>(groups[m[0]]??=[]).push(m));let dates=Object.keys(groups).sort();dayNav.innerHTML=dates.map(d=>`<a href=#d-${d}>${groups[d][0][1].replace('Today — ','')}</a>`).join('');content.innerHTML=dates.map(d=>`<section id=d-${d}><div class=day-title>📅 ${groups[d][0][1]}</div>${groups[d].map(card).join('')}</section>`).join('')}
render();
</script></body></html>
