<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Round of 16 Simulator</title><link rel="stylesheet" href="styles.css"><style>.card{background:#0d1524;border:1px solid var(--border);border-radius:16px;padding:14px;margin:12px 0}.row{display:grid;grid-template-columns:1fr auto;gap:10px;border-top:1px solid #1e293b;padding:8px 0}.owner{color:#facc15}.fav{color:#fdba74;font-weight:900}.dog{color:#86efac;font-weight:900}.pk{color:#93c5fd;font-weight:900}.muted{color:#94a3b8}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.mini{background:#0d1524;border:1px solid var(--border);border-radius:14px;padding:12px}.mini b{display:block;font-size:22px}@media(max-width:700px){.summary{grid-template-columns:1fr}}</style></head><body><h1>Round of 16 Simulator</h1><div class="sub">Official current pool lines and owners, listed chronologically.</div><div id="summary" class="summary"></div><div id="app"></div><script>
const G=[['Jul 4 · 1:00 PM','Canada','Baxter','Morocco','Nolan',-0.5],['Jul 4 · 5:00 PM','Paraguay','Whelan','France','Knox',1.5],['Jul 5 · 4:00 PM','Brazil','Gal','Norway','Knox',-0.5],['Jul 5 · 8:00 PM','Mexico','Merc','England','McCartney',0],['Jul 6 · 3:00 PM','Spain','Whelan','Portugal','Roynan',0.5],['Jul 6 · 8:00 PM','United States','Merc','Belgium','Dolan',0],['Jul 7 · 12:00 PM','Argentina','J. Schwartz','Egypt','Joe',-1.5],['Jul 7 · 4:00 PM','Switzerland','E. Schwartz','Colombia','Baxter',0.5]];
function f(n){return n===0?'PK':n>0?'+'+n:String(n)}function cls(n){return n===0?'pk':n<0?'fav':'dog'}function scenario(g){let [dt,h,ho,a,ao,l]=g;if(l===0)return`PK game: no spread takeover. Whoever advances keeps current owner.`;let fav=l<0?h:a,dog=l<0?a:h,fo=l<0?ho:ao,doo=l<0?ao:ho,n=Math.abs(l);return`${fav} must cover at full time for ${fo} to keep them. If ${fav} advances after not covering, ${doo} takes over ${fav}. If ${dog} advances, ${doo} keeps ${dog}.`}function card(g){let [dt,h,ho,a,ao,l]=g;return`<div class=card><b>${h} vs ${a}</b><div class=muted>${dt}</div><div class=row><span>${h}<br><span class=owner>${ho}</span></span><b class="${cls(l)}">${f(l)}</b></div><div class=row><span>${a}<br><span class=owner>${ao}</span></span><b class="${cls(-l)}">${f(-l)}</b></div><div class=muted>${scenario(g)}</div></div>`}summary.innerHTML=`<div class=mini><b>8</b>Games loaded</div><div class=mini><b>6</b>Spread games</div><div class=mini><b>2</b>PK games</div>`;app.innerHTML=G.map(card).join('');
</script></body></html>
