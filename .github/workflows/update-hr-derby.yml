name: Update HR Derby live API

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  push:
    paths:
      - "scripts/update_hr_derby.py"
      - ".github/workflows/update-hr-derby.yml"

permissions:
  contents: write

concurrency:
  group: hr-derby-live-api
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests beautifulsoup4
      - name: Poll official MLB.com pages
        run: python scripts/update_hr_derby.py --watch 250 --interval 20
      - name: Publish changed JSON
        run: |
          if git diff --quiet -- home-run-derby/data/live.json; then
            echo "No live result changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add home-run-derby/data/live.json
          git commit -m "Update live Home Run Derby API"
          git push
