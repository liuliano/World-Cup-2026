<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><meta charset="utf-8"><title>World Cup Pool</title><link rel="stylesheet" href="styles.css"><style>body{max-width:900px;margin:auto}.card{background:#0d1524;border:1px solid #263653;border-radius:16px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.badge{display:inline-block;border:1px solid #263653;border-radius:999px;padding:3px 8px;margin:3px;font-size:12px}.out{text-decoration:line-through;opacity:.45;color:#94a3b8}.muted{color:#94a3b8}.bar{height:8px;background:#1e293b;border-radius:99px;overflow:hidden}.fill{height:100%;background:#22c55e}table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid #1e293b;padding:7px;text-align:left}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><h1>World Cup 2026 Takeover Pool</h1><div class=muted>Proper rewrite: one current owner per team. No duplicate takeover ownership.</div><div class=grid><div class=card><h2>Daily Recap</h2><div id=recap></div></div><div class=card><h2>If tournament ended today</h2><div id=insights></div></div></div><div class=card><h2>Championship Probability</h2><div id=odds></div></div><div class=card><h2>Simulator</h2><div id=simulator></div></div><div class=card><h2>Current Owners / Teams</h2><div id=owners></div></div><div class=card><h2>Round of 16 Bracket</h2><div id=bracket></div></div><script>const aliveTeams=[['Morocco','Nolan'],['Paraguay','Whelan'],['France','Knox'],['Brazil','Gal'],['Norway','Knox'],['Mexico','Merc'],['England','McCartney'],['Spain','Whelan'],['Portugal','Roynan'],['United States','Merc'],['Belgium','Dolan'],['Argentina','J. Schwartz'],['Egypt','Joe'],['Switzerland','E. Schwartz'],['Colombia','Baxter']];const eliminated=[['Canada','Baxter']];const takeoverTeams=new Set(['England','Belgium','Argentina']);const games=[['Canada','Baxter','Morocco','Nolan',-0.5,0,3],['Paraguay','Whelan','France','Knox',1.5,null,null],['Brazil','Gal','Norway','Knox',-0.5,null,null],['Mexico','Merc','England','McCartney',0,null,null],['Spain','Whelan','Portugal','Roynan',0.5,null,null],['United States','Merc','Belgium','Dolan',0,null,null],['Argentina','J. Schwartz','Egypt','Joe',-1.5,null,null],['Switzerland','E. Schwartz','Colombia','Baxter',0.5,null,null]].map(x=>({home:x[0],ho:x[1],away:x[2],ao:x[3],line:x[4],hs:x[5],as:x[6]}));const strength={Argentina:96,Brazil:94,France:93,Spain:92,England:90,Portugal:88,Belgium:82,Colombia:80,Switzerland:78,'United States':76,Mexico:75,Morocco:72,Norway:71,Egypt:65,Paraguay:63,Canada:61};function ownerMap(){let m={};aliveTeams.forEach(([team,owner])=>{m[owner]??={live:[],out:[]};m[owner].live.push(team)});eliminated.forEach(([team,owner])=>{m[owner]??={live:[],out:[]};m[owner].out.push(team)});return m}function wp(a,b){let x=(strength[a]||60)/((strength[a]||60)+(strength[b]||60));return Math.max(.15,Math.min(.85,x))}function sim(n=5000){let base=aliveTeams.map(([t,o])=>({t,o})),owners=[...new Set(base.map(x=>x.o))],wins=Object.fromEntries(owners.map(o=>[o,0]));for(let i=0;i<n;i++){let teams=base.slice();while(teams.length>1){let next=[];for(let j=0;j<teams.length;j+=2){next.push(!teams[j+1]?teams[j]:(Math.random()<wp(teams[j].t,teams[j+1].t)?teams[j]:teams[j+1]))}teams=next}wins[teams[0].o]++}let map=ownerMap();return Object.entries(wins).map(([owner,w])=>({owner,pct:w/n*100,teams:map[owner]?.live||[]})).sort((a,b)=>b.pct-a.pct)}function projection(){let teams=aliveTeams.map(([t,o])=>({t,o})),html='';while(teams.length>1){let next=[],rows=[];for(let i=0;i<teams.length;i+=2){if(!teams[i+1]){next.push(teams[i]);continue}let a=teams[i],b=teams[i+1],pick=wp(a.t,b.t)>=.5?a:b;next.push(pick);rows.push(`${a.t} (${a.o}) vs ${b.t} (${b.o}) → <b>${pick.t}</b> (${pick.o})`)}html+=`<div class=card>${rows.join('<br>')}</div>`;teams=next}return html}function f(x){return x===0?'PK':x>0?'+'+x:x}function render(){let rows=sim(),lead=rows[0],map=ownerMap();recap.innerHTML=`✔ 1 final loaded<br>🔁 3 takeovers applied<br>🏆 Leader: <b>${lead.owner}</b> ${lead.pct.toFixed(1)}%<br><span class=muted>ownership-rewrite-v3</span>`;insights.innerHTML=`Alive teams: <b>${aliveTeams.length}</b><br>Eliminated shown: <b>${eliminated.length}</b><br>Every team has exactly one current owner.`;odds.innerHTML=`<table><tr><th>Rank</th><th>Owner</th><th>Odds</th><th>Alive teams</th></tr>${rows.map((r,i)=>`<tr><td>#${i+1}</td><td><b>${r.owner}</b></td><td>${r.pct.toFixed(1)}%<div class=bar><div class=fill style='width:${r.pct}%'></div></div></td><td>${r.teams.map(t=>`<span class=badge>${takeoverTeams.has(t)?'🔁 ':''}${t}</span>`).join('')}</td></tr>`).join('')}</table>`;simulator.innerHTML=projection();owners.innerHTML=Object.entries(map).sort().map(([o,v])=>`<div class=card><b>${o}</b><br>${v.live.map(t=>`<span class=badge>${takeoverTeams.has(t)?'🔁 ':''}${t}</span>`).join('')}${v.out.map(t=>`<span class='badge out'><s>${t}</s> ❌</span>`).join('')}</div>`).join('');bracket.innerHTML=games.map(g=>`<div class=card><b>${g.home} vs ${g.away}</b><br>${g.home} <span class=badge>${g.ho}</span> ${g.hs??0} (${f(g.line)})<br>${g.away} <span class=badge>${g.ao}</span> ${g.as??0} (${f(-g.line)})<br><span class=muted>${g.hs==null?'Scheduled':'Final '+g.home+' '+g.hs+'-'+g.as+' '+g.away}</span></div>`).join('')}render()</script></body></html>
