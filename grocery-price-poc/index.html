<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Grocery Price POC</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">ZIP 33579</p>
      <h1>Grocery Price Comparison</h1>
      <p class="muted">Walmart · Publix · Aldi · Sam's Club</p>
    </header>

    <section class="panel">
      <label for="shoppingList">Shopping list</label>
      <textarea id="shoppingList" rows="7" placeholder="whole milk 1 gallon&#10;large eggs 12 count&#10;chicken breast&#10;bananas"></textarea>
      <div class="actions">
        <button id="saveButton" type="button">Save list</button>
        <button id="copyButton" class="secondary" type="button">Copy workflow input</button>
      </div>
      <a id="workflowLink" class="refresh" href="https://github.com/liuliano/World-Cup-2026/actions/workflows/grocery-price-refresh.yml" target="_blank" rel="noreferrer">Refresh prices in GitHub Actions</a>
      <p id="message" class="status" aria-live="polite"></p>
    </section>

    <section class="summary" id="summary"></section>
    <section id="results" class="results" aria-live="polite"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
