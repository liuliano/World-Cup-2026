<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><meta charset="utf-8"><title>World Cup Pool</title><link rel="stylesheet" href="styles.css"><style>body{max-width:900px;margin:auto}.card{background:#0d1524;border:1px solid #263653;border-radius:16px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.badge,.rank{display:inline-block;border:1px solid #263653;border-radius:999px;padding:3px 8px;margin:3px;font-size:12px}.elim{opacity:.55;color:#94a3b8}.take{border-color:#f97316;background:#1c1917}.muted{color:#94a3b8}.big{font-size:26px;font-weight:900}.bar{height:8px;background:#1e293b;border-radius:999px;overflow:hidden}.fill{height:100%;background:#22c55e}.team{display:flex;justify-content:space-between;border-top:1px solid #1e293b;padding:8px 0}.owner{display:block;color:#facc15;font-size:12px}table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid #1e293b;padding:7px;text-align:left}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><h1>World Cup 2026 Takeover Pool</h1><div class=muted>Winner advances; spread result changes owner only.</div><div class=card><button onclick="refreshFromEspn()">Refresh ESPN + Pool Odds</button><div id=stamp class=muted></div><div id=status class=muted>Ready.</div></div><div class=grid><div class=card><h2>Daily Recap</h2><div id=recap></div></div><div class=card><h2>If tournament ended today</h2><div id=insights></div></div></div><div id=top class=grid></div><div class=card><h2>Takeover History</h2><div id=history></div></div><div class=card><h2>Championship Probability</h2><div id=odds></div></div><div class=card><h2>Current Owners / Teams</h2><div class=muted>Only alive teams count for odds.</div><div id=owners></div></div><div class=card><h2>Round of 16 Bracket</h2><div id=r16></div></div><div class=card><h2>Quarterfinals</h2><div id=qf></div></div><div class=card><h2>Semifinals</h2><div id=sf></div></div><div class=card><h2>Final</h2><div id=finals></div></div><script>
const rank={Argentina:1,Brazil:2,France:3,Spain:4,England:5,Portugal:6,Belgium:9,Colombia:10,Switzerland:11,'United States':12,Mexico:13,Morocco:16,Norway:17,Egypt:23,Paraguay:25,Canada:27};
const strength={Argentina:96,Brazil:94,France:93,Spain:92,England:90,Portugal:88,Belgium:82,Colombia:80,Switzerland:78,'United States':76,Mexico:75,Morocco:72,Norway:71,Egypt:65,Paraguay:63,Canada:61};
const baseGames=[['Canada','Baxter','Morocco','Nolan',-0.5,0,3,'Jul 4, 1:00 PM','NRG Stadium — Houston, Texas'],['Paraguay','Whelan','France','Knox',1.5,1,2,'Jul 4, 5:00 PM','Lincoln Financial Field — Philadelphia, Pennsylvania'],['Brazil','Gal','Norway','Knox',-0.5,0,1,'Jul 5, 4:00 PM','MetLife Stadium — East Rutherford, New Jersey'],['Mexico','Merc','England','McCartney',0,0,1,'Jul 5, 8:00 PM','TBD'],['Spain','Whelan','Portugal','Roynan',0.5,2,1,'Jul 6, 3:00 PM','TBD'],['United States','Merc','Belgium','Dolan',0,1,4,'Jul 6, 8:00 PM','Lumen Field — Seattle, Washington'],['Argentina','J. Schwartz','Egypt','Joe',-1.5,3,2,'Jul 7, 12:00 PM','Mercedes-Benz Stadium — Atlanta, Georgia'],['Switzerland','E. Schwartz','Colombia','Baxter',0.5,null,null,'Jul 7, 4:00 PM','BC Place — Vancouver']];
let games=baseGames.map(x=>({h:x[0],ho:x[1],a:x[2],ao:x[3],line:x[4],hs:x[5],as:x[6],time:x[7],venue:x[8],status:x[5]===null?'Scheduled':'Final'}));
const original={Baxter:['Canada','Colombia'],Nolan:['Morocco'],Whelan:['Paraguay','Spain'],Knox:['France','Norway'],Gal:['Brazil'],Merc:['Mexico','United States'],McCartney:['England'],Roynan:['Portugal'],Dolan:['Belgium'],'J. Schwartz':['Argentina'],Joe:['Egypt'],'E. Schwartz':['Switzerland']};
const prior=[['England','Joe','McCartney','England -1.5 | DR Congo +1.5','England 2-1','McCartney took over England.'],['Belgium','J. Schwartz','Dolan','Belgium -0.5 | Senegal +0.5','Belgium 3-2 AET','Dolan took over Belgium.'],['Argentina','McCartney','J. Schwartz','Argentina -2.5 | Cape Verde +2.5','Argentina 3-2','J. Schwartz took over Argentina.']];
let last=localStorage.wc_last_espn||'Manual results loaded';
function norm(x){return String(x||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]/g,'').replace('usa','unitedstates')}
function spread(x){return x===0?'PK':x>0?'+'+x:x}function final(g){return g.hs!==null&&g.as!==null}function teamOwner(g,t){return t===g.h?g.ho:g.ao}function winProb(a,b){let x=(strength[a]||60)/((strength[a]||60)+(strength[b]||60));return Math.max(.15,Math.min(.85,x))}
function result(g){if(!final(g))return null;let w=g.hs>g.as?g.h:g.a;let fav=g.line<0?g.h:g.line>0?g.a:null;let dog=g.line<0?g.a:g.line>0?g.h:null;let own=teamOwner(g,w),ev=null;if(fav&&w===fav){let favCovers=fav===g.h?g.hs+g.line>g.as:g.as-g.line>g.hs;if(!favCovers){own=teamOwner(g,dog);ev=[fav,teamOwner(g,fav),own,g.h+' '+spread(g.line)+' | '+g.a+' '+spread(-g.line),g.h+' '+g.hs+'-'+g.as+' '+g.a,dog+' covered. '+own+' takes over '+fav+'.']}}return{team:w,owner:own,event:ev}}
function pathsFor(i){let g=games[i],r=result(g);if(r)return[{team:r.team,owner:r.owner,p:1}];let q=winProb(g.h,g.a);return[{team:g.h,owner:g.ho,p:q},{team:g.a,owner:g.ao,p:1-q}]}
function mix(A,B){let out=[];A.forEach(a=>B.forEach(b=>{let q=winProb(a.team,b.team);out.push({team:a.team,owner:a.owner,p:a.p*b.p*q});out.push({team:b.team,owner:b.owner,p:a.p*b.p*(1-q)})}));return squash(out)}
function squash(A){let m={};A.forEach(x=>{let k=x.team+'|'+x.owner;m[k]=(m[k]||0)+x.p});return Object.entries(m).map(e=>{let z=e[0].split('|');return{team:z[0],owner:z[1],p:e[1]}})}
function qfPaths(){return[[pathsFor(1),pathsFor(0)],[pathsFor(4),pathsFor(5)],[pathsFor(2),pathsFor(3)],[pathsFor(6),pathsFor(7)]]}
function sfPaths(){let q=qfPaths();return[mix(q[0][0],q[0][1]),mix(q[1][0],q[1][1])]}function finalPaths(){let s=sfPaths();return[mix(s[0],s[1])]}
function oddsRows(){let wins=finalPaths()[0],m={};wins.forEach(x=>m[x.owner]=(m[x.owner]||0)+x.p);let cards=ownerCards();return Object.entries(m).map(e=>({owner:e[0],pct:e[1]*100,teams:cards[e[0]]?cards[e[0]].live:[]})).sort((a,b)=>b.pct-a.pct)}
function alive(){return games.flatMap(g=>{let r=result(g);return r?[{team:r.team,owner:r.owner}]:[{team:g.h,owner:g.ho},{team:g.a,owner:g.ao}]})}
function ownerCards(){let m={};Object.entries(original).forEach(e=>m[e[0]]={live:[],out:e[1].slice()});alive().forEach(x=>{Object.values(m).forEach(v=>{v.live=v.live.filter(t=>t!==x.team);v.out=v.out.filter(t=>t!==x.team)});if(!m[x.owner])m[x.owner]={live:[],out:[]};if(!m[x.owner].live.includes(x.team))m[x.owner].live.push(x.team)});return m}
function historyRows(){let h=prior.slice();games.forEach(g=>{let r=result(g);if(r&&r.event)h.push(r.event)});return h}
function namePath(A){if(A.length===1)return A[0];let t=[...new Set(A.map(x=>x.team))].join(' / ');let o=[...new Set(A.map(x=>x.owner))].join(' / ');return{team:t,owner:o}}
function teamLine(x,score,line){return '<div class=team><span>'+x.team+' '+(rank[x.team]?'<span class=rank>#'+rank[x.team]+'</span>':'')+'<span class=owner>'+x.owner+'</span></span><span><b>'+(score==null?0:score)+'</b> '+(line==null?'':spread(line))+'</span></div>'}
function gameCard(title,a,b,time,venue){return '<div class=card><div class=muted>'+time+' · Scheduled<br>📍 '+venue+'</div><b>'+title+'</b>'+teamLine(a,null,null)+teamLine(b,null,null)+'</div>'}
function r16Card(g){let r=result(g);return '<div class=card><div class=muted>'+g.time+' · '+g.status+'<br>📍 '+g.venue+'</div><b>'+g.h+' vs '+g.a+'</b>'+teamLine({team:g.h,owner:g.ho},g.hs,g.line)+teamLine({team:g.a,owner:g.ao},g.as,-g.line)+(r?'<div class=muted>Winner advances: <b>'+r.team+'</b> · Owner now: <b>'+r.owner+'</b></div>':'')+'</div>'}
function render(){let rows=oddsRows(),hist=historyRows(),cards=ownerCards(),aliveCount=alive().length;stamp.textContent='World Cup updated: '+last;recap.innerHTML='✔ '+games.filter(final).length+' final games loaded<br>🔁 '+hist.length+' takeovers<br>🏆 Leader: <b>'+rows[0].owner+'</b> '+rows[0].pct.toFixed(1)+'%';insights.innerHTML='Alive teams: <b>'+aliveCount+'</b><br>Current favorite: <b>'+rows[0].owner+'</b>';top.innerHTML='<div class=card><span>Round</span><div class=big>Knockout</div></div><div class=card><span>Takeovers</span><div class=big>'+hist.length+'</div></div>';history.innerHTML=hist.map(x=>'<div class="card take"><b>🔁 '+x[0]+'</b><br>'+x[1]+' → <b>'+x[2]+'</b><br><b>Spread:</b> '+x[3]+'<br><b>Final:</b> '+x[4]+'<br><b>Reason:</b> '+x[5]+'</div>').join('');odds.innerHTML='<table><tr><th>Rank</th><th>Owner</th><th>Odds</th><th>Teams</th></tr>'+rows.map((r,i)=>'<tr><td>#'+(i+1)+'</td><td><b>'+r.owner+'</b></td><td><b>'+r.pct.toFixed(1)+'%</b><div class=bar><div class=fill style="width:'+r.pct+'%"></div></div></td><td>'+r.teams.map(t=>'<span class=badge>'+t+'</span>').join('')+'</td></tr>').join('')+'</table>';owners.innerHTML=Object.entries(cards).sort().map(e=>'<div class=card><b>'+e[0]+'</b><br>'+e[1].live.map(t=>'<span class=badge>'+t+'</span>').join('')+e[1].out.map(t=>'<span class="badge elim"><s>'+t+'</s> ❌</span>').join('')+'</div>').join('');r16.innerHTML=games.map(r16Card).join('');let q=qfPaths();qf.innerHTML=[gameCard(namePath(q[0][0]).team+' vs '+namePath(q[0][1]).team,namePath(q[0][0]),namePath(q[0][1]),'Jul 9, 4:00 PM','NRG Stadium — Houston, Texas'),gameCard(namePath(q[1][0]).team+' vs '+namePath(q[1][1]).team,namePath(q[1][0]),namePath(q[1][1]),'Jul 10, 3:00 PM','Lincoln Financial Field — Philadelphia, Pennsylvania'),gameCard(namePath(q[2][0]).team+' vs '+namePath(q[2][1]).team,namePath(q[2][0]),namePath(q[2][1]),'Jul 11, 5:00 PM','MetLife Stadium — East Rutherford, New Jersey'),gameCard(namePath(q[3][0]).team+' vs '+namePath(q[3][1]).team,namePath(q[3][0]),namePath(q[3][1]),'Jul 11, 9:00 PM','TBD')].join('');let s=sfPaths();sf.innerHTML=[gameCard(namePath(s[0]).team+' vs '+namePath(s[1]).team,namePath(s[0]),namePath(s[1]),'Semifinal','TBD')].join('');let f=finalPaths()[0];finals.innerHTML=gameCard('Projected Final Field',namePath(f),{team:'Field',owner:'Remaining owners'},'Final','TBD');}
async function refreshFromEspn(){status.textContent='Calling ESPN...';try{let r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260704-20260712&limit=100&_='+Date.now());let d=await r.json(),n=0;(d.events||[]).forEach(ev=>{let c=ev.competitions&&ev.competitions[0],cs=c&&c.competitors;if(!cs||cs.length<2)return;let h=cs.find(x=>x.homeAway==='home')||cs[0],a=cs.find(x=>x.homeAway==='away')||cs[1];games.forEach(g=>{let gh=norm(g.h),ga=norm(g.a),eh=norm(h.team.displayName),ea=norm(a.team.displayName);if((gh===eh&&ga===ea)||(gh===ea&&ga===eh)){let hs=Number(h.score),as=Number(a.score);g.hs=(gh===eh?hs:as);g.as=(gh===eh?as:hs);g.status=ev.status&&ev.status.type&&ev.status.type.completed?'Final':(ev.status&&ev.status.type&&ev.status.type.shortDetail)||'Live';let v=c.venue;g.venue=[v&&v.fullName,v&&v.address&&v.address.city,v&&v.address&&v.address.state].filter(Boolean).join(' — ')||g.venue;n++}})});last=new Date().toLocaleString()+' ('+n+' games loaded)';localStorage.wc_last_espn=last;render();status.textContent='ESPN refresh complete.'}catch(e){status.textContent='ESPN failed: '+e.message}}
render();
</script></body></html>
