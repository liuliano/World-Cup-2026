<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><meta charset="utf-8"><title>World Cup Pool</title><link rel="stylesheet" href="styles.css"><style>body{max-width:900px;margin:auto}.card{background:#0d1524;border:1px solid #263653;border-radius:16px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.big{font-size:26px;font-weight:900}.muted{color:#94a3b8}.badge,.rank{display:inline-block;border:1px solid #263653;border-radius:999px;padding:3px 8px;margin:2px;font-size:12px}.rank{color:#93c5fd}.owner{display:block;color:#facc15;font-size:12px}.team{display:flex;justify-content:space-between;border-top:1px solid #1e293b;padding:8px 0}.fav{color:#fdba74;font-weight:900}.dog{color:#86efac;font-weight:900}.pk{color:#93c5fd;font-weight:900}.bar{height:8px;background:#1e293b;border-radius:999px;overflow:hidden}.fill{height:100%;background:#22c55e}.take{border-color:#f97316!important;background:#1c1917!important}table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid #1e293b;padding:7px;text-align:left}@media(max-width:700px){.grid{grid-template-columns:1fr}table{font-size:12px}td,th{padding:6px}}</style></head><body><h1>World Cup 2026 Takeover Pool</h1><div class=muted>Daily Recap first · one-button ESPN refresh + pool odds</div><div class=card><button onclick="refreshFromEspn()">Refresh ESPN + Pool Odds</button><div id=stamp class=muted></div><div id=status class=muted>Ready.</div></div><div class=grid><div class=card><h2>Daily Recap</h2><div id=recap></div></div><div class=card><h2>If tournament ended today</h2><div id=insights></div></div></div><div id=top class=grid></div><div class=card><h2>Championship Probability</h2><div id=odds></div></div><div class=card><h2>Round of 16 Bracket</h2><div id=bracket></div></div><div class=card><h2>Current Owners / Alive Teams</h2><div id=owners></div></div><div class=card><h2>Takeover History</h2><div id=history></div></div><script>const G=[['Canada','Baxter','Morocco','Nolan',-0.5,'Jul 4','1:00 PM EDT'],['Paraguay','Whelan','France','Knox',1.5,'Jul 4','5:00 PM EDT'],['Brazil','Gal','Norway','Knox',-0.5,'Jul 5','4:00 PM EDT'],['Mexico','Merc','England','McCartney',0,'Jul 5','8:00 PM EDT'],['Spain','Whelan','Portugal','Roynan',0.5,'Jul 6','3:00 PM EDT'],['United States','Merc','Belgium','Dolan',0,'Jul 6','8:00 PM EDT'],['Argentina','J. Schwartz','Egypt','Joe',-1.5,'Jul 7','12:00 PM EDT'],['Switzerland','E. Schwartz','Colombia','Baxter',0.5,'Jul 7','4:00 PM EDT']].map((x,i)=>({id:i,home:x[0],ho:x[1],away:x[2],ao:x[3],line:x[4],date:x[5],time:x[6]}));const R={Argentina:1,Brazil:2,France:3,Spain:4,England:5,Portugal:6,Belgium:9,Colombia:10,Switzerland:11,'United States':12,Mexico:13,Morocco:16,Norway:17,Egypt:23,Paraguay:25,Canada:27};const S={Argentina:96,Brazil:94,France:93,Spain:92,England:90,Portugal:88,Belgium:82,Colombia:80,Switzerland:78,'United States':76,Mexico:75,Morocco:72,Norway:71,Egypt:65,Paraguay:63,Canada:61};const T=[['England','Joe','McCartney','England -1.5 | DR Congo +1.5','England 2-1'],['Belgium','J. Schwartz','Dolan','Belgium -0.5 | Senegal +0.5','Belgium 3-2 AET'],['Argentina','McCartney','J. Schwartz','Argentina -2.5 | Cape Verde +2.5','Argentina advanced']];let E=JSON.parse(localStorage.wc_espn_results||'{}'),last=localStorage.wc_last_espn||'Never',co=JSON.parse(localStorage.wc_current_odds||'[]'),po=JSON.parse(localStorage.wc_previous_odds||'[]');function c(s){return String(s||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]/g,'').replace('usa','unitedstates').replace('unitedstatesofamerica','unitedstates')}function f(x){return x===0?'PK':x>0?'+'+x:x}function cl(x){return x===0?'pk':x<0?'fav':'dog'}function e(g){return E[c(g.home)+'_'+c(g.away)]||E[c(g.away)+'_'+c(g.home)]}function venue(g){return e(g)?.venue||'TBD'}function meta(g){return e(g)?.dateText||`${g.date} · ${g.time}`}function sc(g,s){let r=e(g);if(!r||r.homeScore==null)return '0';return c(r.home)===c(g.home)?(s==='h'?r.homeScore:r.awayScore):(s==='h'?r.awayScore:r.homeScore)}function st(g){let r=e(g);return r?(r.completed?'Final':(r.status||'Live')):'Scheduled'}function om(){let m={};G.forEach(g=>{(m[g.ho]??=[]).push(g.home);(m[g.ao]??=[]).push(g.away)});return m}function wp(a,b){let x=(S[a]||60)/((S[a]||60)+(S[b]||60));return Math.max(.15,Math.min(.85,x))}function sim(n=4000){let owners=[...new Set(G.flatMap(g=>[g.ho,g.ao]))],wins=Object.fromEntries(owners.map(o=>[o,0]));for(let i=0;i<n;i++){let teams=G.map(g=>Math.random()<wp(g.home,g.away)?{t:g.home,o:g.ho}:{t:g.away,o:g.ao});while(teams.length>1){let nx=[];for(let j=0;j<teams.length;j+=2)nx.push(Math.random()<wp(teams[j].t,teams[j+1].t)?teams[j]:teams[j+1]);teams=nx}wins[teams[0].o]++}return Object.entries(wins).map(([o,w])=>({o,p:w/n*100,teams:(om()[o]||[])})).sort((a,b)=>b.p-a.p)}function runOdds(){po=co;localStorage.wc_previous_odds=JSON.stringify(po);co=sim();localStorage.wc_current_odds=JSON.stringify(co)}function d(o,p){let q=(po.find(x=>x.o===o)||{}).p;if(q==null)return'— +0.0%';let z=p-q;return`${z>0?'▲':z<0?'▼':'—'} ${z>=0?'+':''}${z.toFixed(1)}%`}function render(){let rows=co.length?co:(co=sim()),lead=rows[0];stamp.textContent=last==='Never'?'World Cup: not refreshed yet':'World Cup updated: '+last;recap.innerHTML=`✔ ${G.filter(g=>e(g)?.completed).length} finals loaded<br>🟡 ${G.filter(g=>e(g)&&!e(g).completed).length} live games<br>🔁 ${T.length} takeovers<br>🏆 Leader: <b>${lead.o}</b> ${lead.p.toFixed(1)}%`;insights.innerHTML=`Current favorite: <b>${lead.o}</b><br>Most valuable team: <b>Argentina</b> (J. Schwartz)<br>Biggest takeover watch: favorite advancing without cover`;top.innerHTML=`<div class=card><span>Round</span><div class=big>R16</div></div><div class=card><span>Takeovers</span><div class=big>${T.length}</div></div><div class=card><span>PK Games</span><div class=big>${G.filter(g=>g.line===0).length}</div></div><div class=card><span>Spread Games</span><div class=big>${G.filter(g=>g.line!==0).length}</div></div>`;odds.innerHTML=`<table><tr><th>Rank</th><th>Owner</th><th>Odds</th><th>Move</th><th>Teams</th></tr>${rows.map((r,i)=>`<tr><td>#${i+1}</td><td><b>${r.o}</b></td><td><b>${r.p.toFixed(1)}%</b><div class=bar><div class=fill style="width:${r.p}%"></div></div></td><td>${d(r.o,r.p)}</td><td>${r.teams.map(t=>`<span class=badge>${T.some(x=>x[0]===t)?'🔁 ':''}${t}</span>`).join('')}</td></tr>`).join('')}</table>`;bracket.innerHTML=G.map(g=>`<div class=card><div class=muted>${meta(g)} · ${st(g)}<br>📍 ${venue(g)}</div><b>${g.home} vs ${g.away}</b><div class=team><span>${g.home} ${R[g.home]?`<span class=rank>#${R[g.home]}</span>`:''}<span class=owner>${g.ho}</span></span><span><b>${sc(g,'h')}</b> <span class=${cl(g.line)}>${f(g.line)}</span></span></div><div class=team><span>${g.away} ${R[g.away]?`<span class=rank>#${R[g.away]}</span>`:''}<span class=owner>${g.ao}</span></span><span><b>${sc(g,'a')}</b> <span class=${cl(-g.line)}>${f(-g.line)}</span></span></div></div>`).join('');owners.innerHTML=Object.entries(om()).sort().map(([o,ts])=>`<div class=card><b>${o}</b><br>${ts.map(t=>`<span class=badge>${t}</span>`).join('')}</div>`).join('');history.innerHTML=T.map(t=>`<div class="card take"><b>🔁 ${t[0]}</b><br>${t[1]} → <b>${t[2]}</b><br><b>Spread:</b> ${t[3]}<br><b>Final:</b> ${t[4]}</div>`).join('')}async function refreshFromEspn(){status.textContent='Calling ESPN and recalculating odds...';try{let r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260704-20260707&limit=100&_='+Date.now());let data=await r.json(),found=0;(data.events||[]).forEach(ev=>{let k=ev.competitions?.[0],cs=k?.competitors||[];if(cs.length<2)return;let h=cs.find(x=>x.homeAway==='home')||cs[0],a=cs.find(x=>x.homeAway==='away')||cs[1],v=k?.venue,venue=[v?.fullName,v?.address?.city,v?.address?.state].filter(Boolean).join(' — '),dt=new Date(ev.date);E[c(h.team.displayName)+'_'+c(a.team.displayName)]={home:h.team.displayName,away:a.team.displayName,homeScore:h.score===''?null:Number(h.score),awayScore:a.score===''?null:Number(a.score),completed:!!ev.status?.type?.completed,status:ev.status?.type?.shortDetail||ev.status?.type?.description||'',venue,dateText:dt.toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})};found++});localStorage.wc_espn_results=JSON.stringify(E);last=`${new Date().toLocaleString()} (${found} games loaded)`;localStorage.wc_last_espn=last;runOdds();render();status.textContent='ESPN refresh confirmed and pool odds recalculated.'}catch(err){status.textContent='ESPN failed: '+err.message}}render()</script></body></html>
