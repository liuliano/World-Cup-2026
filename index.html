<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>World Cup Pool</title><link rel="stylesheet" href="styles.css"><style>body{max-width:900px;margin:auto}.card{background:#0d1524;border:1px solid #263653;border-radius:16px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.badge,.rank{display:inline-block;border:1px solid #263653;border-radius:999px;padding:3px 8px;margin:3px;font-size:12px}.elim,.badge.elim{text-decoration:line-through!important;opacity:.45;background:#111827!important;color:#94a3b8!important}.take{border-color:#f97316!important;background:#1c1917!important}.muted{color:#94a3b8}.big{font-size:26px;font-weight:900}.bar{height:8px;background:#1e293b;border-radius:999px;overflow:hidden}.fill{height:100%;background:#22c55e}.team{display:flex;justify-content:space-between;border-top:1px solid #1e293b;padding:8px 0}.owner{display:block;color:#facc15;font-size:12px}.fav{color:#fdba74;font-weight:900}.dog{color:#86efac;font-weight:900}.pk{color:#93c5fd;font-weight:900}table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid #1e293b;padding:7px;text-align:left}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><h1>World Cup 2026 Takeover Pool</h1><div class="muted">Owner cards show eliminated teams crossed out.</div><div class="card"><button onclick="refreshFromEspn()">Refresh ESPN + Pool Odds</button><div id="stamp" class="muted"></div><div id="status" class="muted">Ready.</div></div><div class="grid"><div class="card"><h2>Daily Recap</h2><div id="recap"></div></div><div class="card"><h2>If tournament ended today</h2><div id="insights"></div></div></div><div id="top" class="grid"></div><div class="card"><h2>Takeover History</h2><div id="history"></div></div><div class="card"><h2>Championship Probability</h2><div id="odds"></div></div><div class="card"><h2>Current Owners / Teams</h2><div class="muted">Crossed out = eliminated. Alive teams count for odds.</div><div id="owners"></div></div><div class="card"><h2>Round of 16 Bracket</h2><div id="bracket"></div></div><script>const G=[['Canada','Baxter','Morocco','Nolan',-0.5,'Jul 4','1:00 PM EDT'],['Paraguay','Whelan','France','Knox',1.5,'Jul 4','5:00 PM EDT'],['Brazil','Gal','Norway','Knox',-0.5,'Jul 5','4:00 PM EDT'],['Mexico','Merc','England','McCartney',0,'Jul 5','8:00 PM EDT'],['Spain','Whelan','Portugal','Roynan',0.5,'Jul 6','3:00 PM EDT'],['United States','Merc','Belgium','Dolan',0,'Jul 6','8:00 PM EDT'],['Argentina','J. Schwartz','Egypt','Joe',-1.5,'Jul 7','12:00 PM EDT'],['Switzerland','E. Schwartz','Colombia','Baxter',0.5,'Jul 7','4:00 PM EDT']].map((x,i)=>({id:i,home:x[0],ho:x[1],away:x[2],ao:x[3],line:x[4],date:x[5],time:x[6]}));const HISTORY={Baxter:['Canada','Colombia'],Nolan:['Morocco'],Whelan:['Paraguay','Spain'],Knox:['France','Norway'],Gal:['Brazil'],Merc:['Mexico','United States'],McCartney:['England'],Roynan:['Portugal'],Dolan:['Belgium'],'J. Schwartz':['Argentina'],Joe:['Egypt'],'E. Schwartz':['Switzerland']};const R={Argentina:1,Brazil:2,France:3,Spain:4,England:5,Portugal:6,Belgium:9,Colombia:10,Switzerland:11,'United States':12,Mexico:13,Morocco:16,Norway:17,Egypt:23,Paraguay:25,Canada:27};const S={Argentina:96,Brazil:94,France:93,Spain:92,England:90,Portugal:88,Belgium:82,Colombia:80,Switzerland:78,'United States':76,Mexico:75,Morocco:72,Norway:71,Egypt:65,Paraguay:63,Canada:61};const BASE=[['England','Joe','McCartney','England -1.5 | DR Congo +1.5','England 2-1','DR Congo covered. McCartney took over England.'],['Belgium','J. Schwartz','Dolan','Belgium -0.5 | Senegal +0.5','Belgium 3-2 AET','Senegal covered at full time. Dolan took over Belgium.'],['Argentina','McCartney','J. Schwartz','Argentina -2.5 | Cape Verde +2.5','Argentina 3-2','Cape Verde covered. J. Schwartz took over Argentina.']];let E=JSON.parse(localStorage.wc_espn_results||'{}'),last=localStorage.wc_last_espn||'Never',co=[],po=JSON.parse(localStorage.wc_previous_odds||'[]');function c(s){return String(s||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]/g,'').replace('usa','unitedstates').replace('unitedstatesofamerica','unitedstates')}function f(x){return x===0?'PK':x>0?'+'+x:x}function cl(x){return x===0?'pk':x<0?'fav':'dog'}function er(g){if(c(g.home)==='canada'&&c(g.away)==='morocco')return{home:'Canada',away:'Morocco',homeScore:0,awayScore:3,completed:true,status:'Final',venue:'',dateText:'Jul 4, 1:00 PM'};return E[c(g.home)+'_'+c(g.away)]||E[c(g.away)+'_'+c(g.home)]}function meta(g){return er(g)?.dateText||`${g.date} · ${g.time}`}function venue(g){return er(g)?.venue||'TBD'}function sc(g,s){let r=er(g);if(!r||r.homeScore==null)return '0';return c(r.home)===c(g.home)?(s==='h'?r.homeScore:r.awayScore):(s==='h'?r.awayScore:r.homeScore)}function done(g){return !!er(g)?.completed}function stat(g){let r=er(g);return r?(r.completed?'Final':(r.status||'Live')):'Scheduled'}function own(g,t){return t===g.home?g.ho:g.ao}function win(g){if(!done(g))return null;let h=+sc(g,'h'),a=+sc(g,'a');return h>a?g.home:a>h?g.away:null}function rr(g){let w=win(g);if(!w)return null;let h=+sc(g,'h'),a=+sc(g,'a'),fav=g.line<0?g.home:g.line>0?g.away:null,dog=g.line<0?g.away:g.line>0?g.home:null,o=own(g,w),event=null;if(fav&&w===fav){let covered=fav===g.home?h+g.line>a:a-g.line>h;if(!covered){o=own(g,dog);event=[fav,own(g,fav),o,`${g.home} ${f(g.line)} | ${g.away} ${f(-g.line)}`,`${g.home} ${h}-${a} ${g.away}`,`${dog} covered. ${o} takes over ${fav}.`]}}return{winner:w,owner:o,loser:w===g.home?g.away:g.home,event}}function alive(){let a=[];G.forEach(g=>{let r=rr(g);if(r)a.push([r.winner,r.owner]);else{a.push([g.home,g.ho]);a.push([g.away,g.ao])}});return a}function liveSet(){return new Set(alive().map(x=>x[0]))}function take(){let h=BASE.slice();G.forEach(g=>{let r=rr(g);if(r&&r.event)h.push(r.event)});return h}function omap(){let set=liveSet(),m={};Object.entries(HISTORY).forEach(([o,teams])=>{m[o]={live:[],out:[]};teams.forEach(t=>(set.has(t)?m[o].live:m[o].out).push(t))});alive().forEach(([t,o])=>{if(!m[o])m[o]={live:[],out:[]};if(!m[o].live.includes(t))m[o].live.push(t)});return m}function wp(a,b){let x=(S[a]||60)/((S[a]||60)+(S[b]||60));return Math.max(.15,Math.min(.85,x))}function sim(n=3000){let base=alive().map(x=>({t:x[0],o:x[1]})),owners=[...new Set(base.map(x=>x.o))],wins=Object.fromEntries(owners.map(o=>[o,0]));for(let i=0;i<n;i++){let teams=base.slice();while(teams.length>1){let nx=[];for(let j=0;j<teams.length;j+=2){if(!teams[j+1])nx.push(teams[j]);else nx.push(Math.random()<wp(teams[j].t,teams[j+1].t)?teams[j]:teams[j+1])}teams=nx}wins[teams[0].o]++}let m=omap();return Object.entries(wins).map(([o,w])=>({o,p:w/n*100,teams:m[o]?.live||[]})).sort((a,b)=>b.p-a.p)}function move(o,p){let q=(po.find(x=>x.o===o)||{}).p;if(q==null)return'— +0.0%';let z=p-q;return`${z>0?'▲':z<0?'▼':'—'} ${z>=0?'+':''}${z.toFixed(1)}%`}function render(){co=sim();let rows=co,lead=rows[0],hist=take(),m=omap(),out=Object.values(m).reduce((n,v)=>n+v.out.length,0);stamp.textContent=last==='Never'?'World Cup: not refreshed yet':'World Cup updated: '+last;recap.innerHTML=`✔ ${G.filter(done).length} final games loaded<br>🔁 ${hist.length} takeovers<br>🏆 Leader: <b>${lead.o}</b> ${lead.p.toFixed(1)}%`;insights.innerHTML=`Current favorite: <b>${lead.o}</b><br>Alive teams: <b>${alive().length}</b><br>Crossed out: <b>${out}</b>`;top.innerHTML=`<div class=card><span>Round</span><div class=big>R16</div></div><div class=card><span>Takeovers</span><div class=big>${hist.length}</div></div><div class=card><span>Finals</span><div class=big>${G.filter(done).length}</div></div>`;history.innerHTML=hist.map(t=>`<div class="card take"><b>🔁 ${t[0]}</b><br>${t[1]} → <b>${t[2]}</b><br><b>Spread:</b> ${t[3]}<br><b>Final:</b> ${t[4]}<br><b>Reason:</b> ${t[5]}</div>`).join('');odds.innerHTML=`<table><tr><th>Rank</th><th>Owner</th><th>Odds</th><th>Move</th><th>Teams</th></tr>${rows.map((r,i)=>`<tr><td>#${i+1}</td><td><b>${r.o}</b></td><td><b>${r.p.toFixed(1)}%</b><div class=bar><div class=fill style="width:${r.p}%"></div></div></td><td>${move(r.o,r.p)}</td><td>${r.teams.map(t=>`<span class=badge>${hist.some(x=>x[0]===t)?'🔁 ':''}${t}</span>`).join('')}</td></tr>`).join('')}</table>`;owners.innerHTML=Object.entries(m).sort().map(([o,v])=>`<div class=card><b>${o}</b><br>${v.live.map(t=>`<span class=badge>${t}</span>`).join('')}${v.out.map(t=>`<span class="badge elim" style="text-decoration:line-through!important;opacity:.45;color:#94a3b8!important">${t}</span>`).join('')}</div>`).join('');bracket.innerHTML=G.map(g=>`<div class=card><div class=muted>${meta(g)} · ${stat(g)}<br>📍 ${venue(g)}</div><b>${g.home} vs ${g.away}</b><div class=team><span>${g.home} ${R[g.home]?`<span class=rank>#${R[g.home]}</span>`:''}<span class=owner>${g.ho}</span></span><span><b>${sc(g,'h')}</b> <span class=${cl(g.line)}>${f(g.line)}</span></span></div><div class=team><span>${g.away} ${R[g.away]?`<span class=rank>#${R[g.away]}</span>`:''}<span class=owner>${g.ao}</span></span><span><b>${sc(g,'a')}</b> <span class=${cl(-g.line)}>${f(-g.line)}</span></span></div>${done(g)?`<div class=muted>Winner advances: <b>${rr(g).winner}</b> · Owner now: <b>${rr(g).owner}</b></div>`:''}</div>`).join('')}async function refreshFromEspn(){status.textContent='Calling ESPN and recalculating odds...';try{let r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260704-20260707&limit=100&_='+Date.now());let data=await r.json(),found=0;(data.events||[]).forEach(ev=>{let k=ev.competitions?.[0],cs=k?.competitors||[];if(cs.length<2)return;let h=cs.find(x=>x.homeAway==='home')||cs[0],a=cs.find(x=>x.homeAway==='away')||cs[1],v=k?.venue,ven=[v?.fullName,v?.address?.city,v?.address?.state].filter(Boolean).join(' — '),dt=new Date(ev.date);E[c(h.team.displayName)+'_'+c(a.team.displayName)]={home:h.team.displayName,away:a.team.displayName,homeScore:h.score===''?null:Number(h.score),awayScore:a.score===''?null:Number(a.score),completed:!!ev.status?.type?.completed,status:ev.status?.type?.shortDetail||ev.status?.type?.description||'',venue:ven,dateText:dt.toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})};found++});localStorage.wc_espn_results=JSON.stringify(E);last=`${new Date().toLocaleString()} (${found} games loaded)`;localStorage.wc_last_espn=last;po=co;localStorage.wc_previous_odds=JSON.stringify(po);render();status.textContent='ESPN refresh confirmed and pool odds recalculated.'}catch(err){status.textContent='ESPN failed: '+err.message}}render()</script></body></html>
