<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>World Cup Pool</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body{max-width:900px;margin:auto}.card{background:#0d1524;border:1px solid #263653;border-radius:16px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.badge,.rank{display:inline-block;border:1px solid #263653;border-radius:999px;padding:3px 8px;margin:3px;font-size:12px}.elim{opacity:.55;color:#94a3b8;text-decoration:line-through}.take{border-color:#f97316;background:#1c1917}.muted{color:#94a3b8}.big{font-size:26px;font-weight:900}.bar{height:8px;background:#1e293b;border-radius:999px;overflow:hidden}.fill{height:100%;background:#22c55e}.team{display:flex;justify-content:space-between;border-top:1px solid #1e293b;padding:8px 0;gap:8px}.owner{display:block;color:#facc15;font-size:12px}.fav{color:#fdba74;font-weight:900}.dog{color:#86efac;font-weight:900}.pk{color:#93c5fd;font-weight:900}table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid #1e293b;padding:7px;text-align:left;vertical-align:top}button{background:#2563eb;color:white;border:0;border-radius:10px;padding:10px 12px;font-weight:800}@media(max-width:700px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <h1>World Cup 2026 Takeover Pool</h1>
  <div class="muted">Winner advances; spread result changes owner only.</div>

  <div class="card">
    <button onclick="refreshFromEspn()">Refresh ESPN + Pool Odds</button>
    <button onclick="render()">Run Pool Odds</button>
    <div id="stamp" class="muted"></div>
    <div id="status" class="muted">Ready.</div>
  </div>

  <div class="grid">
    <div class="card"><h2>Daily Recap</h2><div id="recap"></div></div>
    <div class="card"><h2>If tournament ended today</h2><div id="insights"></div></div>
  </div>

  <div id="top" class="grid"></div>

  <div class="card"><h2>Championship Probability</h2><div id="odds"></div></div>
  <div class="card"><h2>Quarterfinals</h2><div id="qf"></div></div>
  <div class="card"><h2>Semifinals</h2><div id="sf"></div></div>
  <div class="card"><h2>Final</h2><div id="finals"></div></div>
  <div class="card"><h2>Current Owners / Teams</h2><div class="muted">Only alive teams count for odds.</div><div id="owners"></div></div>
  <div class="card"><h2>Round of 16 Bracket</h2><div id="r16"></div></div>
  <div class="card"><h2>Takeover History</h2><div id="history"></div></div>

  <script src="js/data.js?v=mod1" defer></script>
  <script src="js/rules.js?v=mod1" defer></script>
  <script src="js/simulation.js?v=mod1" defer></script>
  <script src="js/cards.js?v=mod1" defer></script>
  <script src="js/renderers.js?v=mod1" defer></script>
  <script src="js/espn.js?v=mod1" defer></script>
  <script src="js/main.js?v=mod1" defer></script>
</body>
