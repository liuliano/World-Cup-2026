<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>World Cup Pool</title><link rel="stylesheet" href="styles.css"><style>body{max-width:900px;margin:auto}.card{background:#0d1524;border:1px solid #263653;border-radius:16px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.badge,.rank{display:inline-block;border:1px solid #263653;border-radius:999px;padding:3px 8px;margin:3px;font-size:12px}.elim{opacity:.55;color:#94a3b8;text-decoration:line-through}.take{border-color:#f97316;background:#1c1917}.muted{color:#94a3b8}.big{font-size:26px;font-weight:900}.bar{height:8px;background:#1e293b;border-radius:999px;overflow:hidden}.fill{height:100%;background:#22c55e}.team{display:flex;justify-content:space-between;border-top:1px solid #1e293b;padding:8px 0;gap:8px}.owner{display:block;color:#facc15;font-size:12px}.fav{color:#fdba74;font-weight:900}.dog{color:#86efac;font-weight:900}.pk{color:#93c5fd;font-weight:900}table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid #1e293b;padding:7px;text-align:left;vertical-align:top}button{background:#2563eb;color:white;border:0;border-radius:10px;padding:10px 12px;font-weight:800}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><h1>World Cup 2026 Takeover Pool</h1><div class=muted>Winner advances; spread result changes owner only.</div><div class=card><button onclick="refreshFromEspn()">Refresh ESPN + Pool Odds</button> <button onclick="render()">Run Pool Odds</button><div id=stamp class=muted></div><div id=status class=muted>Ready.</div></div><div class=grid><div class=card><h2>Daily Recap</h2><div id=recap></div></div><div class=card><h2>If tournament ended today</h2><div id=insights></div></div></div><div id=top class=grid></div><div class=card><h2>Takeover History</h2><div id=history></div></div><div class=card><h2>Championship Probability</h2><div id=odds></div></div><div class=card><h2>Current Owners / Teams</h2><div class=muted>Only alive teams count for odds.</div><div id=owners></div></div><div class=card><h2>Round of 16 Bracket</h2><div id=r16></div></div><div class=card><h2>Quarterfinals</h2><div id=qf></div></div><div class=card><h2>Semifinals</h2><div id=sf></div></div><div class=card><h2>Final</h2><div id=finals></div></div><script>
const R={Argentina:1,France:3,Spain:4,England:5,Belgium:9,Switzerland:11,Morocco:16,Norway:17,Egypt:23,Canada:27,Paraguay:25,Portugal:6,Colombia:10,Brazil:2,Mexico:13,'United States':12};
const S={Argentina:96,France:93,Spain:92,England:90,Belgium:82,Switzerland:78,Morocco:72,Norway:71,Egypt:65,Canada:61,Paraguay:63,Portugal:88,Colombia:80,Brazil:94,Mexico:75,'United States':76};
const BASE=[['England','Joe','McCartney','England -1.5 | DR Congo +1.5','England 2-1','DR Congo covered. McCartney took over England.'],['Belgium','J. Schwartz','Dolan','Belgium -0.5 | Senegal +0.5','Belgium 3-2 AET','Senegal covered. Dolan took over Belgium.'],['Argentina','McCartney','J. Schwartz','Argentina -2.5 | Cape Verde +2.5','Argentina 3-2','Cape Verde covered. J. Schwartz took over Argentina.']];
const HISTORY={Baxter:['Canada','Colombia'],Nolan:['Morocco'],Whelan:['Paraguay','Spain','France'],Knox:['France','Norway'],Gal:['Brazil'],Merc:['Mexico','United States'],McCartney:['England'],Roynan:['Portugal'],Dolan:['Belgium'],'J. Schwartz':['Argentina'],Joe:['Egypt','Argentina'],'E. Schwartz':['Switzerland']};
let E=JSON.parse(localStorage.wc_espn_results||'{}'),last=localStorage.wc_last_espn||'Never',prev=JSON.parse(localStorage.wc_previous_odds||'[]');
const r16=[
{h:'Canada',ho:'Baxter',a:'Morocco',ao:'Nolan',line:-.5,hs:0,as:3,date:'Jul 4, 1:00 PM',venue:'NRG Stadium — Houston, Texas'},
{h:'Paraguay',ho:'Whelan',a:'France',ao:'Knox',line:1.5,hs:0,as:1,date:'Jul 4, 5:00 PM',venue:'Lincoln Financial Field — Philadelphia, Pennsylvania'},
{h:'Brazil',ho:'Gal',a:'Norway',ao:'Knox',line:-.5,hs:1,as:2,date:'Jul 5, 4:00 PM',venue:'MetLife Stadium — East Rutherford, New Jersey'},
{h:'Mexico',ho:'Merc',a:'England',ao:'McCartney',line:0,hs:0,as:2,date:'Jul 5, 8:00 PM',venue:'AT&T Stadium — Arlington, Texas'},
{h:'Spain',ho:'Whelan',a:'Portugal',ao:'Roynan',line:.5,hs:2,as:1,date:'Jul 6, 3:00 PM',venue:'Hard Rock Stadium — Miami, Florida'},
{h:'United States',ho:'Merc',a:'Belgium',ao:'Dolan',line:0,hs:1,as:4,date:'Jul 6, 8:00 PM',venue:'Lumen Field — Seattle, Washington'},
{h:'Argentina',ho:'J. Schwartz',a:'Egypt',ao:'Joe',line:-1.5,hs:3,as:2,date:'Jul 7, 12:00 PM',venue:'Mercedes-Benz Stadium — Atlanta, Georgia'},
{h:'Switzerland',ho:'E. Schwartz',a:'Colombia',ao:'Baxter',line:.5,hs:3,as:1,date:'Jul 7, 4:00 PM',venue:'BC Place — Vancouver'}];
let qf=[
{h:'France',ho:'Whelan',a:'Morocco',ao:'Nolan',line:-.5,hs:null,as:null,date:'Jul 9, 4:00 PM',venue:'NRG Stadium — Houston, Texas'},
{h:'Spain',ho:'Whelan',a:'Belgium',ao:'Dolan',line:-.5,hs:null,as:null,date:'Jul 10, 3:00 PM',venue:'Lincoln Financial Field — Philadelphia, Pennsylvania'},
{h:'England',ho:'McCartney',a:'Norway',ao:'Knox',line:-.5,hs:null,as:null,date:'Jul 11, 5:00 PM',venue:'MetLife Stadium — East Rutherford, New Jersey'},
{h:'Argentina',ho:'Joe',a:'Switzerland',ao:'E. Schwartz',line:-.5,hs:null,as:null,date:'Jul 11, 9:00 PM',venue:'TBD'}];
function norm(s){return String(s||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]/g,'').replace('usa','unitedstates')}
function spread(x){return x===0?'PK':x>0?'+'+x:x}function cls(x){return x===0?'pk':x<0?'fav':'dog'}function rank(t){return R[t]?`<span class=rank>#${R[t]}</span>`:''}
function owner(g,t){return t===g.h?g.ho:g.ao}function final(g){return g.hs!==null&&g.as!==null}
function result(g){if(!final(g))return null;let w=g.hs>g.as?g.h:g.a,lose=w===g.h?g.a:g.h,fav=g.line<0?g.h:g.line>0?g.a:null,dog=g.line<0?g.a:g.line>0?g.h:null,o=owner(g,w),ev=null;if(fav&&w===fav){let cov=fav===g.h?g.hs+g.line>g.as:g.as-g.line>g.hs;if(!cov){o=owner(g,dog);ev=[fav,owner(g,fav),o,`${g.h} ${spread(g.line)} | ${g.a} ${spread(-g.line)}`,`${g.h} ${g.hs}-${g.as} ${g.a}`,`${dog} covered. ${o} takes over ${fav}.`]}}return{team:w,owner:o,loser:lose,event:ev}}
function card(g){let r=result(g);return `<div class=card><div class=muted>${g.date} · ${final(g)?'Final':'Scheduled'}<br>📍 ${g.venue}</div><b>${g.h} vs ${g.a}</b><div class=team><span>${g.h} ${rank(g.h)}<span class=owner>${g.ho}</span></span><span><b>${g.hs??0}</b> <span class=${cls(g.line)}>${spread(g.line)}</span></span></div><div class=team><span>${g.a} ${rank(g.a)}<span class=owner>${g.ao}</span></span><span><b>${g.as??0}</b> <span class=${cls(-g.line)}>${spread(-g.line)}</span></span></div>${r?`<div class=muted>Winner advances: <b>${r.team}</b> · Owner now: <b>${r.owner}</b></div>`:''}</div>`}
function qfTeams(){return qf.map(g=>result(g)||{team:null,owner:null})}
function sfGames(){let a=result(qf[0]),b=result(qf[1]),c=result(qf[2]),d=result(qf[3]);return [{h:a?.team||'Winner France/Morocco',ho:a?.owner||'',a:b?.team||'Winner Spain/Belgium',ao:b?.owner||'',line:0,hs:null,as:null,date:'Semifinal',venue:'TBD'},{h:c?.team||'Winner England/Norway',ho:c?.owner||'',a:d?.team||'Winner Argentina/Switzerland',ao:d?.owner||'',line:0,hs:null,as:null,date:'Semifinal',venue:'TBD'}]}
function finalGame(){let s=sfGames().map(g=>result(g));return {h:s[0]?.team||'Winner SF1',ho:s[0]?.owner||'',a:s[1]?.team||'Winner SF2',ao:s[1]?.owner||'',line:0,hs:null,as:null,date:'Final',venue:'TBD'}}
function alive(){let arr=[];qf.forEach(g=>{let r=result(g); if(r) arr.push([r.team,r.owner]); else {arr.push([g.h,g.ho]); arr.push([g.a,g.ao]);}});return arr}
function takeovers(){let t=BASE.slice();r16.concat(qf).forEach(g=>{let r=result(g); if(r&&r.event)t.push(r.event)});return t}
function ownerCards(){let live=new Set(alive().map(x=>x[0])),m={};Object.entries(HISTORY).forEach(([o,ts])=>{m[o]={live:[],out:[]};ts.forEach(t=>(live.has(t)?m[o].live:m[o].out).push(t))});alive().forEach(([t,o])=>{Object.values(m).forEach(v=>{v.live=v.live.filter(x=>x!==t);v.out=v.out.filter(x=>x!==t)});m[o]??={live:[],out:[]};if(!m[o].live.includes(t))m[o].live.push(t)});return m}
function wp(a,b){let x=(S[a]||60)/((S[a]||60)+(S[b]||60));return Math.max(.12,Math.min(.88,x))}
function play(x,y){if(!y)return x;return Math.random()<wp(x.t,y.t)?x:y}
function simulate(n=8000){let wins={},base=alive().map(([t,o])=>({t,o}));base.forEach(x=>wins[x.o]=0);for(let i=0;i<n;i++){let q1=play(base[0],base[1]),q2=play(base[2],base[3]),q3=play(base[4],base[5]),q4=play(base[6],base[7]);let s1=play(q1,q2),s2=play(q3,q4),c=play(s1,s2);wins[c.o]++}let cards=ownerCards();return Object.entries(wins).map(([o,w])=>({o,p:w/n*100,teams:cards[o]?.live||[]})).sort((a,b)=>b.p-a.p)}
function move(o,p){let q=(prev.find(x=>x.o===o)||{}).p;if(q==null)return'— +0.0%';let z=p-q;return`${z>0?'▲':z<0?'▼':'—'} ${z>=0?'+':''}${z.toFixed(1)}%`}
function render(){let rows=simulate(),hist=takeovers(),cards=ownerCards(),out=Object.values(cards).reduce((n,v)=>n+v.out.length,0);stamp.textContent=last==='Never'?'World Cup: not refreshed yet':'World Cup updated: '+last;recap.innerHTML=`✔ ${r16.filter(final).length} Round of 16 finals<br>🔁 ${hist.length} takeovers<br>🏆 Leader: <b>${rows[0].o}</b> ${rows[0].p.toFixed(1)}%`;insights.innerHTML=`Alive teams: <b>${alive().length}</b><br>Eliminated shown: <b>${out}</b>`;top.innerHTML=`<div class=card><span>Round</span><div class=big>Quarterfinals</div></div><div class=card><span>Takeovers</span><div class=big>${hist.length}</div></div>`;history.innerHTML=hist.map(t=>`<div class='card take'><b>🔁 ${t[0]}</b><br>${t[1]} → <b>${t[2]}</b><br><b>Spread:</b> ${t[3]}<br><b>Final:</b> ${t[4]}<br><b>Reason:</b> ${t[5]}</div>`).join('');odds.innerHTML=`<table><tr><th>Rank</th><th>Owner</th><th>Odds</th><th>Move</th><th>Teams</th></tr>${rows.map((r,i)=>`<tr><td>#${i+1}</td><td><b>${r.o}</b></td><td><b>${r.p.toFixed(1)}%</b><div class=bar><div class=fill style='width:${r.p}%'></div></div></td><td>${move(r.o,r.p)}</td><td>${r.teams.map(t=>`<span class=badge>${hist.some(x=>x[0]===t)?'🔁 ':''}${t}</span>`).join('')}</td></tr>`).join('')}</table>`;owners.innerHTML=Object.entries(cards).sort().map(([o,v])=>`<div class=card><b>${o}</b><br>${v.live.map(t=>`<span class=badge>${hist.some(x=>x[0]===t)?'🔁 ':''}${t}</span>`).join('')}${v.out.map(t=>`<span class='badge elim'>${t} ❌</span>`).join('')}</div>`).join('');r16.innerHTML=r16.map(card).join('');qf.innerHTML=qf.map(card).join('');sf.innerHTML=sfGames().map(card).join('');finals.innerHTML=card(finalGame())}
async function refreshFromEspn(){status.textContent='Refreshing ESPN and recalculating...';try{let r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260709-20260711&limit=100&_='+Date.now());let d=await r.json(),found=0;(d.events||[]).forEach(ev=>{let comp=ev.competitions?.[0],cs=comp?.competitors||[];if(cs.length<2)return;let h=cs.find(x=>x.homeAway==='home')||cs[0],a=cs.find(x=>x.homeAway==='away')||cs[1];qf.forEach(g=>{if((norm(g.h)===norm(h.team.displayName)&&norm(g.a)===norm(a.team.displayName))||(norm(g.h)===norm(a.team.displayName)&&norm(g.a)===norm(h.team.displayName))){let gh=norm(g.h)===norm(h.team.displayName)?h:a,ga=gh===h?a:h;g.hs=gh.score===''?null:Number(gh.score);g.as=ga.score===''?null:Number(ga.score);found++;}})});last=`${new Date().toLocaleString()} (${found} QF games matched)`;localStorage.wc_last_espn=last;prev=simulate();localStorage.wc_previous_odds=JSON.stringify(prev);render();status.textContent='ESPN refresh complete.'}catch(e){status.textContent='ESPN failed: '+e.message}}render();
</script></body></html>
