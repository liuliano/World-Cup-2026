<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><meta charset="utf-8"><title>World Cup Pool</title><link rel="stylesheet" href="styles.css"><style>body{max-width:900px;margin:auto}.card{background:#0d1524;border:1px solid #263653;border-radius:16px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.badge,.rank{display:inline-block;border:1px solid #263653;border-radius:999px;padding:3px 8px;margin:3px;font-size:12px}.elim{opacity:.55;color:#94a3b8;text-decoration:line-through}.take{border-color:#f97316;background:#1c1917}.muted{color:#94a3b8}.big{font-size:26px;font-weight:900}.bar{height:8px;background:#1e293b;border-radius:999px;overflow:hidden}.fill{height:100%;background:#22c55e}.team{display:flex;justify-content:space-between;border-top:1px solid #1e293b;padding:8px 0;gap:8px}.owner{display:block;color:#facc15;font-size:12px}.fav{color:#fdba74;font-weight:900}.dog{color:#86efac;font-weight:900}.pk{color:#93c5fd;font-weight:900}table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid #1e293b;padding:7px;text-align:left;vertical-align:top}button{background:#2563eb;color:white;border:0;border-radius:10px;padding:10px 12px;font-weight:800}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><h1>World Cup 2026 Takeover Pool</h1><div class=muted>Winner advances; spread result changes owner only.</div><div class=card><button onclick="refreshFromEspn()">Refresh ESPN + Pool Odds</button> <button onclick="render()">Run Pool Odds</button><div id=stamp class=muted></div><div id=status class=muted>Ready.</div></div><div class=grid><div class=card><h2>Daily Recap</h2><div id=recap></div></div><div class=card><h2>If tournament ended today</h2><div id=insights></div></div></div><div id=top class=grid></div><div class=card><h2>Takeover History</h2><div id=history></div></div><div class=card><h2>Championship Probability</h2><div id=odds></div></div><div class=card><h2>Current Owners / Teams</h2><div class=muted>Only alive teams count for odds.</div><div id=owners></div></div><div class=card><h2>Round of 16 Bracket</h2><div id=r16></div></div><div class=card><h2>Quarterfinals</h2><div id=qf></div></div><div class=card><h2>Semifinals</h2><div id=sf></div></div><div class=card><h2>Final</h2><div id=finals></div></div><script>
const G=[['Canada','Baxter','Morocco','Nolan',-0.5,'Jul 4, 1:00 PM','NRG Stadium — Houston, Texas'],['Paraguay','Whelan','France','Knox',1.5,'Jul 4, 5:00 PM','Lincoln Financial Field — Philadelphia, Pennsylvania'],['Brazil','Gal','Norway','Knox',-0.5,'Jul 5, 4:00 PM','MetLife Stadium — East Rutherford, New Jersey'],['Mexico','Merc','England','McCartney',0,'Jul 5, 8:00 PM','AT&T Stadium — Arlington, Texas'],['Spain','Whelan','Portugal','Roynan',0.5,'Jul 6, 3:00 PM','Hard Rock Stadium — Miami, Florida'],['United States','Merc','Belgium','Dolan',0,'Jul 6, 8:00 PM','Lumen Field — Seattle, Washington'],['Argentina','J. Schwartz','Egypt','Joe',-1.5,'Jul 7, 12:00 PM','Mercedes-Benz Stadium — Atlanta, Georgia'],['Switzerland','E. Schwartz','Colombia','Baxter',0.5,'Jul 7, 4:00 PM','BC Place — Vancouver']].map((x,i)=>({id:i,home:x[0],ho:x[1],away:x[2],ao:x[3],line:x[4],time:x[5],venue:x[6]}));
const HISTORY={Baxter:['Canada','Colombia'],Nolan:['Morocco'],Whelan:['Paraguay','Spain'],Knox:['France','Norway'],Gal:['Brazil'],Merc:['Mexico','United States'],McCartney:['England'],Roynan:['Portugal'],Dolan:['Belgium'],'J. Schwartz':['Argentina'],Joe:['Egypt'],'E. Schwartz':['Switzerland']};
const R={Argentina:1,Brazil:2,France:3,Spain:4,England:5,Portugal:6,Belgium:9,Colombia:10,Switzerland:11,'United States':12,Mexico:13,Morocco:16,Norway:17,Egypt:23,Paraguay:25,Canada:27};
const S={Argentina:96,Brazil:94,France:93,Spain:92,England:90,Portugal:88,Belgium:82,Colombia:80,Switzerland:78,'United States':76,Mexico:75,Morocco:72,Norway:71,Egypt:65,Paraguay:63,Canada:61};
const BASE=[['England','Joe','McCartney','England -1.5 | DR Congo +1.5','England 2-1','DR Congo covered. McCartney took over England.'],['Belgium','J. Schwartz','Dolan','Belgium -0.5 | Senegal +0.5','Belgium 3-2 AET','Senegal covered at full time. Dolan took over Belgium.'],['Argentina','McCartney','J. Schwartz','Argentina -2.5 | Cape Verde +2.5','Argentina 3-2','Cape Verde covered. J. Schwartz took over Argentina.']];
const DEFAULT_RESULTS={canada_morocco:{home:'Canada',away:'Morocco',homeScore:0,awayScore:3,completed:true,status:'Final'},unitedstates_belgium:{home:'United States',away:'Belgium',homeScore:1,awayScore:4,completed:true,status:'Final'},argentina_egypt:{home:'Argentina',away:'Egypt',homeScore:3,awayScore:2,completed:true,status:'Final'}};
let E=Object.assign({},DEFAULT_RESULTS,JSON.parse(localStorage.wc_espn_results||'{}'));let last=localStorage.wc_last_espn||'Not refreshed this session';let previous=JSON.parse(localStorage.wc_previous_odds||'[]');
function norm(s){return String(s||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]/g,'').replace('usa','unitedstates').replace('unitedstatesofamerica','unitedstates')}function key(a,b){return norm(a)+'_'+norm(b)}function spread(x){return x===0?'PK':x>0?'+'+x:x}function spreadCls(x){return x===0?'pk':x<0?'fav':'dog'}
function gameResult(g){return E[key(g.home,g.away)]||E[key(g.away,g.home)]||null}function displayedScore(g,side){let r=gameResult(g);if(!r||r.homeScore==null)return '0';let flip=norm(r.home)!==norm(g.home);return side==='h'?(flip?r.awayScore:r.homeScore):(flip?r.homeScore:r.awayScore)}function isDone(g){return !!(gameResult(g)&&gameResult(g).completed)}function statusText(g){let r=gameResult(g);return r?(r.completed?'Final':(r.status||'Live')):'Scheduled'}function ownerAtKick(g,t){return norm(t)===norm(g.home)?g.ho:g.ao}
function winner(g){let r=gameResult(g);if(!r||!r.completed||r.homeScore==null||r.awayScore==null)return null;let hs=+displayedScore(g,'h'),as=+displayedScore(g,'a');return hs>as?g.home:as>hs?g.away:null}
function resolve(g){let w=winner(g);if(!w)return null;let hs=+displayedScore(g,'h'),as=+displayedScore(g,'a');let fav=g.line<0?g.home:g.line>0?g.away:null;let dog=g.line<0?g.away:g.line>0?g.home:null;let own=ownerAtKick(g,w),ev=null;if(fav&&norm(w)===norm(fav)){let favCovered=fav===g.home?hs+g.line>as:as-g.line>hs;if(!favCovered){own=ownerAtKick(g,dog);ev=[fav,ownerAtKick(g,fav),own,g.home+' '+spread(g.line)+' | '+g.away+' '+spread(-g.line),g.home+' '+hs+'-'+as+' '+g.away,dog+' covered. '+own+' takes over '+fav+'.']}}return{team:w,owner:own,loser:norm(w)===norm(g.home)?g.away:g.home,event:ev}}
function slotFromGame(i){let r=resolve(G[i]);return r?{team:r.team,owner:r.owner}:null}function rawSlot(i,side){let g=G[i];return side==='h'?{team:g.home,owner:g.ho}:{team:g.away,owner:g.ao}}
function alive(){let a=[];G.forEach(g=>{let r=resolve(g);if(r)a.push([r.team,r.owner]);else{a.push([g.home,g.ho]);a.push([g.away,g.ao])}});return a}
function qfPairs(){return [[slotFromGame(1),slotFromGame(0)],[slotFromGame(4),slotFromGame(5)],[slotFromGame(2),slotFromGame(3)],[slotFromGame(6),slotFromGame(7)]]}
function takeovers(){let h=BASE.slice();G.forEach(g=>{let r=resolve(g);if(r&&r.event)h.push(r.event)});return h}
function ownerCards(){let live=new Set(alive().map(x=>x[0])),m={};Object.entries(HISTORY).forEach(([o,teams])=>{m[o]={live:[],out:[]};teams.forEach(t=>(live.has(t)?m[o].live:m[o].out).push(t))});alive().forEach(([t,o])=>{Object.values(m).forEach(v=>{v.live=v.live.filter(x=>x!==t);v.out=v.out.filter(x=>x!==t)});if(!m[o])m[o]={live:[],out:[]};if(!m[o].live.includes(t))m[o].live.push(t)});return m}
function wp(a,b){let x=(S[a]||60)/((S[a]||60)+(S[b]||60));return Math.max(.12,Math.min(.88,x))}function pick(a,b){if(!a)return b;if(!b)return a;return Math.random()<wp(a.team,b.team)?a:b}
function sim(n=5000){let base=alive().map(([team,owner])=>({team,owner})),wins={};base.forEach(x=>wins[x.owner]=wins[x.owner]||0);for(let i=0;i<n;i++){let teams=base.slice();while(teams.length>1){let nx=[];for(let j=0;j<teams.length;j+=2)nx.push(pick(teams[j],teams[j+1]));teams=nx}if(teams[0])wins[teams[0].owner]++}let cards=ownerCards();return Object.keys(wins).map(o=>({o,p:wins[o]/n*100,teams:cards[o]?.live||[]})).sort((a,b)=>b.p-a.p)}
function move(o,p){let old=(previous.find(x=>x.o===o)||{}).p;if(old==null)return '— +0.0%';let d=p-old;return (d>0?'▲ ':d<0?'▼ ':'— ')+(d>=0?'+':'')+d.toFixed(1)+'%'}
function chip(team,owner){let rk=R[team]?'<span class=rank>#'+R[team]+'</span>':'';return '<span>'+team+' '+rk+'<span class=owner>'+(owner||'')+'</span></span>'}
function card(a,b,time,venue,status='Scheduled'){let s1=a||{team:'TBD',owner:''},s2=b||{team:'TBD',owner:''};return '<div class=card><div class=muted>'+time+' · '+status+'<br>📍 '+venue+'</div><b>'+s1.team+' vs '+s2.team+'</b><div class=team>'+chip(s1.team,s1.owner)+'<span><b>0</b></span></div><div class=team>'+chip(s2.team,s2.owner)+'<span><b>0</b></span></div></div>'}
function r16Card(g){let r=resolve(g);return '<div class=card><div class=muted>'+g.time+' · '+statusText(g)+'<br>📍 '+g.venue+'</div><b>'+g.home+' vs '+g.away+'</b><div class=team>'+chip(g.home,g.ho)+'<span><b>'+displayedScore(g,'h')+'</b> <span class='+spreadCls(g.line)+'>'+spread(g.line)+'</span></span></div><div class=team>'+chip(g.away,g.ao)+'<span><b>'+displayedScore(g,'a')+'</b> <span class='+spreadCls(-g.line)+'>'+spread(-g.line)+'</span></span></div>'+(r?'<div class=muted>Winner advances: <b>'+r.team+'</b> · Owner now: <b>'+r.owner+'</b></div>':'')+'</div>'}
function projectedRound(pairs){return pairs.map(x=>pick(x[0],x[1]))}
function render(){let rows=sim(),lead=rows[0]||{o:'TBD',p:0},hist=takeovers(),cards=ownerCards();stamp.textContent='World Cup updated: '+last;recap.innerHTML='✔ '+G.filter(isDone).length+' final games loaded<br>🔁 '+hist.length+' takeovers<br>🏆 Leader: <b>'+lead.o+'</b> '+lead.p.toFixed(1)+'%';insights.innerHTML='Alive teams: <b>'+alive().length+'</b><br>Current favorite: <b>'+lead.o+'</b>';top.innerHTML='<div class=card><span>Round</span><div class=big>R16</div></div><div class=card><span>Takeovers</span><div class=big>'+hist.length+'</div></div><div class=card><span>Finals</span><div class=big>'+G.filter(isDone).length+'</div></div>';history.innerHTML=hist.map(t=>'<div class="card take"><b>🔁 '+t[0]+'</b><br>'+t[1]+' → <b>'+t[2]+'</b><br><b>Spread:</b> '+t[3]+'<br><b>Final:</b> '+t[4]+'<br><b>Reason:</b> '+t[5]+'</div>').join('');odds.innerHTML='<table><tr><th>Rank</th><th>Owner</th><th>Odds</th><th>Move</th><th>Teams</th></tr>'+rows.map((r,i)=>'<tr><td>#'+(i+1)+'</td><td><b>'+r.o+'</b></td><td><b>'+r.p.toFixed(1)+'%</b><div class=bar><div class=fill style="width:'+r.p+'%"></div></div></td><td>'+move(r.o,r.p)+'</td><td>'+r.teams.map(t=>'<span class=badge>'+t+'</span>').join('')+'</td></tr>').join('')+'</table>';owners.innerHTML=Object.entries(cards).sort().map(([o,v])=>'<div class=card><b>'+o+'</b><br>'+v.live.map(t=>'<span class=badge>'+t+'</span>').join('')+v.out.map(t=>'<span class="badge elim">'+t+' ❌</span>').join('')+'</div>').join('');r16.innerHTML=G.map(r16Card).join('');let qp=qfPairs();let meta=[['Jul 9, 4:00 PM','NRG Stadium — Houston, Texas'],['Jul 10, 3:00 PM','Lincoln Financial Field — Philadelphia, Pennsylvania'],['Jul 11, 5:00 PM','MetLife Stadium — East Rutherford, New Jersey'],['Jul 11, 9:00 PM','TBD']];qf.innerHTML=qp.map((p,i)=>card(p[0],p[1],meta[i][0],meta[i][1])).join('');let sfTeams=projectedRound(qp);sf.innerHTML=card(sfTeams[0],sfTeams[1],'Jul 14, 8:00 PM','AT&T Stadium — Arlington, Texas')+card(sfTeams[2],sfTeams[3],'Jul 15, 8:00 PM','Mercedes-Benz Stadium — Atlanta, Georgia');let fin=projectedRound([[sfTeams[0],sfTeams[1]],[sfTeams[2],sfTeams[3]]]);finals.innerHTML=card(fin[0],fin[1],'Jul 19, 6:00 PM','MetLife Stadium — East Rutherford, New Jersey')}
async function refreshFromEspn(){status.textContent='Calling ESPN and recalculating odds...';try{let r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260704-20260707&limit=100&_='+Date.now());let data=await r.json(),found=0;(data.events||[]).forEach(ev=>{let c=ev.competitions&&ev.competitions[0],cs=c&&c.competitors;if(!cs||cs.length<2)return;let h=cs.find(x=>x.homeAway==='home')||cs[0],a=cs.find(x=>x.homeAway==='away')||cs[1];E[key(h.team.displayName,a.team.displayName)]={home:h.team.displayName,away:a.team.displayName,homeScore:h.score===''?null:Number(h.score),awayScore:a.score===''?null:Number(a.score),completed:!!ev.status?.type?.completed,status:ev.status?.type?.shortDetail||ev.status?.type?.description||'Live'};found++});localStorage.wc_espn_results=JSON.stringify(E);previous=sim();localStorage.wc_previous_odds=JSON.stringify(previous);last=new Date().toLocaleString()+' ('+found+' games loaded)';localStorage.wc_last_espn=last;render();status.textContent='ESPN refresh confirmed and pool odds recalculated.'}catch(e){status.textContent='ESPN failed: '+e.message;render()}}
render();</script></body></html>
