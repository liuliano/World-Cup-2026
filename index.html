<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><meta charset="utf-8"><title>World Cup Pool</title><link rel="stylesheet" href="styles.css"><style>body{max-width:900px;margin:auto}.card{background:#0d1524;border:1px solid #263653;border-radius:16px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.badge,.rank{display:inline-block;border:1px solid #263653;border-radius:999px;padding:3px 8px;margin:3px;font-size:12px}.elim{opacity:.55;background:#111827!important;color:#94a3b8!important}.take{border-color:#f97316!important;background:#1c1917!important}.muted{color:#94a3b8}.big{font-size:26px;font-weight:900}.bar{height:8px;background:#1e293b;border-radius:999px;overflow:hidden}.fill{height:100%;background:#22c55e}.team{display:flex;justify-content:space-between;border-top:1px solid #1e293b;padding:8px 0}.owner{display:block;color:#facc15;font-size:12px}.fav{color:#fdba74;font-weight:900}.dog{color:#86efac;font-weight:900}.pk{color:#93c5fd;font-weight:900}table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid #1e293b;padding:7px;text-align:left}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><h1>World Cup 2026 Takeover Pool</h1><div class=muted>Owner logic fixed: spread cover changes owner, not advancing team.</div><div class=card><button onclick="render()">Refresh Pool Odds</button><div id=status class=muted>Ready.</div></div><div class=grid><div class=card><h2>Daily Recap</h2><div id=recap></div></div><div class=card><h2>If tournament ended today</h2><div id=insights></div></div></div><div id=top class=grid></div><div class=card><h2>Takeover History</h2><div id=history></div></div><div class=card><h2>Championship Probability</h2><div id=odds></div></div><div class=card><h2>Current Owners / Teams</h2><div class=muted>Only alive teams count for odds.</div><div id=owners></div></div><div class=card><h2>Round of 16 Bracket</h2><div id=r16></div></div><div class=card><h2>Quarterfinals</h2><div id=qf></div></div><div class=card><h2>Semifinals</h2><div id=sf></div></div><script>const G=[['Canada','Baxter','Morocco','Nolan',-0.5,0,3],['Paraguay','Whelan','France','Knox',1.5,null,null],['Brazil','Gal','Norway','Knox',-0.5,null,null],['Mexico','Merc','England','McCartney',0,null,null],['Spain','Whelan','Portugal','Roynan',0.5,null,null],['United States','Merc','Belgium','Dolan',0,null,null],['Argentina','J. Schwartz','Egypt','Joe',-1.5,3,2],['Switzerland','E. Schwartz','Colombia','Baxter',0.5,null,null]].map((x,i)=>({id:i,home:x[0],ho:x[1],away:x[2],ao:x[3],line:x[4],hs:x[5],as:x[6]}));const HIST={Baxter:['Canada','Colombia'],Nolan:['Morocco'],Whelan:['Paraguay','Spain'],Knox:['France','Norway'],Gal:['Brazil'],Merc:['Mexico','United States'],McCartney:['England'],Roynan:['Portugal'],Dolan:['Belgium'],'J. Schwartz':['Argentina'],Joe:['Egypt'],'E. Schwartz':['Switzerland']};const R={Argentina:1,Brazil:2,France:3,Spain:4,England:5,Portugal:6,Belgium:9,Colombia:10,Switzerland:11,'United States':12,Mexico:13,Morocco:16,Norway:17,Egypt:23,Paraguay:25,Canada:27};const S={Argentina:96,Brazil:94,France:93,Spain:92,England:90,Portugal:88,Belgium:82,Colombia:80,Switzerland:78,'United States':76,Mexico:75,Morocco:72,Norway:71,Egypt:65,Paraguay:63,Canada:61};const BASE=[['England','Joe','McCartney','England -1.5 | DR Congo +1.5','England 2-1','DR Congo covered. McCartney took over England.'],['Belgium','J. Schwartz','Dolan','Belgium -0.5 | Senegal +0.5','Belgium 3-2 AET','Senegal covered at full time. Dolan took over Belgium.'],['Argentina','McCartney','J. Schwartz','Argentina -2.5 | Cape Verde +2.5','Argentina 3-2','Cape Verde covered. J. Schwartz took over Argentina.']];function spread(x){return x===0?'PK':x>0?'+'+x:x}function spc(x){return x===0?'pk':x<0?'fav':'dog'}function own(g,t){return t===g.home?g.ho:g.ao}function final(g){return g.hs!==null&&g.as!==null}function res(g){if(!final(g))return null;let w=g.hs>g.as?g.home:g.away;let fav=g.line<0?g.home:g.line>0?g.away:null,dog=g.line<0?g.away:g.line>0?g.home:null,o=own(g,w),ev=null;if(fav&&w===fav){let cov=fav===g.home?g.hs+g.line>g.as:g.as-g.line>g.hs;if(!cov){o=own(g,dog);ev=[fav,own(g,fav),o,`${g.home} ${spread(g.line)} | ${g.away} ${spread(-g.line)}`,`${g.home} ${g.hs}-${g.as} ${g.away}`,`${dog} covered. ${o} takes over ${fav}.`]}}return{winner:w,owner:o,loser:w===g.home?g.away:g.home,event:ev}}function alive(){let a=[];G.forEach(g=>{let r=res(g);r?a.push([r.winner,r.owner]):(a.push([g.home,g.ho]),a.push([g.away,g.ao]))});return a}function cards(){let m={};Object.entries(HIST).forEach(([o,ts])=>m[o]={live:[],out:ts.slice()});alive().forEach(([t,o])=>{Object.values(m).forEach(v=>{v.live=v.live.filter(x=>x!==t);v.out=v.out.filter(x=>x!==t)});m[o]??={live:[],out:[]};m[o].live.push(t)});return m}function hist(){let h=BASE.slice();G.forEach(g=>{let r=res(g);if(r&&r.event)h.push(r.event)});return h}function wp(a,b){let x=(S[a]||60)/((S[a]||60)+(S[b]||60));return Math.max(.15,Math.min(.85,x))}function play(a,b){if(!a)return b;if(!b)return a;if(a.t==='TBD')return b;if(b.t==='TBD')return a;return Math.random()<wp(a.t,b.t)?a:b}function qfs(){let r=G.map(res),s=i=>r[i]?{t:r[i].winner,o:r[i].owner}:{t:'TBD',o:''};return[[s(1),s(0)],[s(4),s(5)],[s(2),s(3)],[s(6),s(7)]]}function sim(n=4000){let q=qfs(),base=q.flat().filter(x=>x.t!=='TBD'),wins={};base.forEach(x=>wins[x.o]=0);for(let i=0;i<n;i++){let c=play(play(play(q[0][0],q[0][1]),play(q[1][0],q[1][1])),play(play(q[2][0],q[2][1]),play(q[3][0],q[3][1])));if(c&&c.o)wins[c.o]=(wins[c.o]||0)+1}let c=cards();return Object.entries(wins).map(([o,w])=>({o,p:w/n*100,teams:c[o]?.live||[]})).sort((a,b)=>b.p-a.p)}function line(t,sp){return `<div class=team><span>${t.t} ${R[t.t]?`<span class=rank>#${R[t.t]}</span>`:''}<span class=owner>${t.o||''}</span></span><span><b>0</b> ${sp!=null?`<span class=${spc(sp)}>${spread(sp)}</span>`:''}</span></div>`}function card(g){let r=res(g);return `<div class=card><div class=muted>Scheduled<br>📍 TBD</div><b>${g.home} vs ${g.away}</b><div class=team><span>${g.home} ${R[g.home]?`<span class=rank>#${R[g.home]}</span>`:''}<span class=owner>${g.ho}</span></span><span><b>${g.hs??0}</b> <span class=${spc(g.line)}>${spread(g.line)}</span></span></div><div class=team><span>${g.away} ${R[g.away]?`<span class=rank>#${R[g.away]}</span>`:''}<span class=owner>${g.ao}</span></span><span><b>${g.as??0}</b> <span class=${spc(-g.line)}>${spread(-g.line)}</span></span></div>${r?`<div class=muted>Winner advances: <b>${r.winner}</b> · Owner now: <b>${r.owner}</b></div>`:''}</div>`}function qcard(a,b,i){let m=['NRG Stadium — Houston, Texas','Lincoln Financial Field — Philadelphia, Pennsylvania','MetLife Stadium — East Rutherford, New Jersey','TBD'][i];return `<div class=card><div class=muted>Scheduled<br>📍 ${m}</div><b>${a.t} vs ${b.t}</b>${line(a)}${line(b)}</div>`}function render(){let rows=sim(),h=hist(),c=cards(),q=qfs(),lead=rows[0];recap.innerHTML=`✔ ${G.filter(final).length} final games loaded<br>🔁 ${h.length} takeovers<br>🏆 Leader: <b>${lead?.o||'TBD'}</b> ${lead?lead.p.toFixed(1):'0.0'}%`;insights.innerHTML=`Current favorite: <b>${lead?.o||'TBD'}</b><br>Alive teams: <b>${alive().length}</b>`;top.innerHTML=`<div class=card><span>Round</span><div class=big>R16</div></div><div class=card><span>Takeovers</span><div class=big>${h.length}</div></div><div class=card><span>Finals</span><div class=big>${G.filter(final).length}</div></div>`;history.innerHTML=h.map(t=>`<div class='card take'><b>🔁 ${t[0]}</b><br>${t[1]} → <b>${t[2]}</b><br><b>Spread:</b> ${t[3]}<br><b>Final:</b> ${t[4]}<br><b>Reason:</b> ${t[5]}</div>`).join('');odds.innerHTML=`<table><tr><th>Rank</th><th>Owner</th><th>Odds</th><th>Teams</th></tr>${rows.map((r,i)=>`<tr><td>#${i+1}</td><td><b>${r.o}</b></td><td><b>${r.p.toFixed(1)}%</b><div class=bar><div class=fill style='width:${r.p}%'></div></div></td><td>${r.teams.map(t=>`<span class=badge>${h.some(x=>x[0]===t)?'🔁 ':''}${t}</span>`).join('')}</td></tr>`).join('')}</table>`;owners.innerHTML=Object.entries(c).sort().map(([o,v])=>`<div class=card><b>${o}</b><br>${v.live.map(t=>`<span class=badge>${h.some(x=>x[0]===t)?'🔁 ':''}${t}</span>`).join('')}${v.out.map(t=>`<span class='badge elim'><s>${t}</s> ❌</span>`).join('')}</div>`).join('');r16.innerHTML=G.map(card).join('');qf.innerHTML=q.map((p,i)=>qcard(p[0],p[1],i)).join('');sf.innerHTML=`${qcard(play(q[0][0],q[0][1]),play(q[1][0],q[1][1]),0)}${qcard(play(q[2][0],q[2][1]),play(q[3][0],q[3][1]),1)}`}render()</script></body></html>
