<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><meta charset="utf-8"><title>World Cup Pool</title><link rel="stylesheet" href="styles.css"><style>body{max-width:900px;margin:auto}.card{background:#0d1524;border:1px solid #263653;border-radius:16px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.badge,.rank{display:inline-block;border:1px solid #263653;border-radius:999px;padding:3px 8px;margin:3px;font-size:12px}.elim{opacity:.55;color:#94a3b8}.take{border-color:#f97316;background:#1c1917}.muted{color:#94a3b8}.big{font-size:26px;font-weight:900}.bar{height:8px;background:#1e293b;border-radius:999px;overflow:hidden}.fill{height:100%;background:#22c55e}.team{display:flex;justify-content:space-between;border-top:1px solid #1e293b;padding:8px 0}.owner{display:block;color:#facc15;font-size:12px}table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid #1e293b;padding:7px;text-align:left}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><h1>World Cup 2026 Takeover Pool</h1><div class=muted>Owner logic fixed. Winner advances; spread cover changes owner only.</div><div class=card><button onclick=render()>Refresh Pool Odds</button><div class=muted>Ready.</div></div><div class=grid><div class=card><h2>Daily Recap</h2><div id=recap></div></div><div class=card><h2>If tournament ended today</h2><div id=insights></div></div></div><div id=top class=grid></div><div class=card><h2>Takeover History</h2><div id=history></div></div><div class=card><h2>Championship Probability</h2><div id=odds></div></div><div class=card><h2>Current Owners / Teams</h2><div class=muted>Only alive teams count for odds.</div><div id=owners></div></div><div class=card><h2>Round of 16 Bracket</h2><div id=r16></div></div><div class=card><h2>Quarterfinals</h2><div id=qf></div></div><div class=card><h2>Semifinals</h2><div id=sf></div></div><script>
const rank={Argentina:1,Brazil:2,France:3,Spain:4,England:5,Portugal:6,Belgium:9,Colombia:10,Switzerland:11,'United States':12,Mexico:13,Morocco:16,Norway:17,Egypt:23,Paraguay:25,Canada:27};
const str={Argentina:96,Brazil:94,France:93,Spain:92,England:90,Portugal:88,Belgium:82,Colombia:80,Switzerland:78,'United States':76,Mexico:75,Morocco:72,Norway:71,Egypt:65,Paraguay:63,Canada:61};
const games=[['Canada','Baxter','Morocco','Nolan',-0.5,0,3,'NRG Stadium — Houston, Texas'],['Paraguay','Whelan','France','Knox',1.5,1,2,'Lincoln Financial Field — Philadelphia, Pennsylvania'],['Brazil','Gal','Norway','Knox',-0.5,0,1,'MetLife Stadium — East Rutherford, New Jersey'],['Mexico','Merc','England','McCartney',0,0,1,'TBD'],['Spain','Whelan','Portugal','Roynan',0.5,2,1,'TBD'],['United States','Merc','Belgium','Dolan',0,1,4,'Lumen Field — Seattle, Washington'],['Argentina','J. Schwartz','Egypt','Joe',-1.5,3,2,'Mercedes-Benz Stadium — Atlanta, Georgia'],['Switzerland','E. Schwartz','Colombia','Baxter',0.5,null,null,'BC Place — Vancouver']].map(x=>({h:x[0],ho:x[1],a:x[2],ao:x[3],line:x[4],hs:x[5],as:x[6],v:x[7]}));
const original={Baxter:['Canada','Colombia'],Nolan:['Morocco'],Whelan:['Paraguay','Spain'],Knox:['France','Norway'],Gal:['Brazil'],Merc:['Mexico','United States'],McCartney:['England'],Roynan:['Portugal'],Dolan:['Belgium'],'J. Schwartz':['Argentina'],Joe:['Egypt'],'E. Schwartz':['Switzerland']};
const prior=[['England','Joe','McCartney','England -1.5 | DR Congo +1.5','England 2-1','DR Congo covered. McCartney took over England.'],['Belgium','J. Schwartz','Dolan','Belgium -0.5 | Senegal +0.5','Belgium 3-2 AET','Senegal covered. Dolan took over Belgium.'],['Argentina','McCartney','J. Schwartz','Argentina -2.5 | Cape Verde +2.5','Argentina 3-2','Cape Verde covered. J. Schwartz took over Argentina.']];
function s(x){return x===0?'PK':x>0?'+'+x:x}function final(g){return g.hs!==null&&g.as!==null}function owner(g,t){return t===g.h?g.ho:g.ao}function p(a,b){let x=(str[a]||60)/((str[a]||60)+(str[b]||60));return Math.max(.15,Math.min(.85,x))}
function result(g){if(!final(g))return null;let w=g.hs>g.as?g.h:g.a,f=g.line<0?g.h:g.line>0?g.a:null,d=g.line<0?g.a:g.line>0?g.h:null,o=owner(g,w),ev=null;if(f&&w===f){let cov=f===g.h?g.hs+g.line>g.as:g.as-g.line>g.hs;if(!cov){o=owner(g,d);ev=[f,owner(g,f),o,`${g.h} ${s(g.line)} | ${g.a} ${s(-g.line)}`,`${g.h} ${g.hs}-${g.as} ${g.a}`,`${d} covered. ${o} takes over ${f}.`]}}return{t:w,o,ev}}
function slots(i){let r=result(games[i]);return r?[{t:r.t,o:r.o,p:1}]:[{t:games[i].h,o:games[i].ho,p:p(games[i].h,games[i].a)},{t:games[i].a,o:games[i].ao,p:1-p(games[i].h,games[i].a)}]}
function alive(){return games.flatMap(g=>{let r=result(g);return r?[{t:r.t,o:r.o}]:[{t:g.h,o:g.ho},{t:g.a,o:g.ao}]})}
function ownerCards(){let m={};Object.entries(original).forEach(([o,ts])=>m[o]={live:[],out:ts.slice()});alive().forEach(x=>{Object.values(m).forEach(v=>{v.live=v.live.filter(t=>t!==x.t);v.out=v.out.filter(t=>t!==x.t)});m[x.o]??={live:[],out:[]};if(!m[x.o].live.includes(x.t))m[x.o].live.push(x.t)});return m}
function history(){let h=prior.slice();games.forEach(g=>{let r=result(g);if(r&&r.ev)h.push(r.ev)});return h}
function combo(A,B){let out=[];A.forEach(a=>B.forEach(b=>{let q=p(a.t,b.t);out.push({t:a.t,o:a.o,p:a.p*b.p*q});out.push({t:b.t,o:b.o,p:a.p*b.p*(1-q)})}));return out}
function squash(A){let m={};A.forEach(x=>{let k=x.t+'|'+x.o;m[k]=(m[k]||0)+x.p});return Object.entries(m).map(([k,p])=>{let [t,o]=k.split('|');return{t,o,p}})}
function qf(){return[[slots(1),slots(0)],[slots(4),slots(5)],[slots(2),slots(3)],[slots(6),slots(7)]]}
function odds(){let q=qf(),a=squash(combo(q[0][0],q[0][1])),b=squash(combo(q[1][0],q[1][1])),f=squash(combo(a,b)),w={};f.forEach(x=>w[x.o]=(w[x.o]||0)+x.p);let c=ownerCards();return Object.entries(w).map(([o,p])=>({o,p:p*100,teams:c[o]?.live||[]})).sort((a,b)=>b.p-a.p)}
function disp(A){return A.length===1?A[0]:{t:A.map(x=>x.t).join(' / '),o:A.map(x=>x.o).join(' / ')}}
function team(x,score,spread){return `<div class=team><span>${x.t} ${rank[x.t]?`<span class=rank>#${rank[x.t]}</span>`:''}<span class=owner>${x.o}</span></span><span><b>${score??0}</b> ${spread!==undefined?s(spread):''}</span></div>`}
function card(title,a,b,venue){return `<div class=card><div class=muted>Scheduled<br>📍 ${venue}</div><b>${title}</b>${team(a)}${team(b)}</div>`}
function rcard(g){let r=result(g);return `<div class=card><div class=muted>${final(g)?'Final':'Scheduled'}<br>📍 ${g.v}</div><b>${g.h} vs ${g.a}</b>${team({t:g.h,o:g.ho},g.hs,g.line)}${team({t:g.a,o:g.ao},g.as,-g.line)}${r?`<div class=muted>Winner advances: <b>${r.t}</b> · Owner now: <b>${r.o}</b></div>`:''}</div>`}
function render(){let h=history(),c=ownerCards(),rows=odds(),q=qf(),lead=rows[0];recap.innerHTML=`✔ ${games.filter(final).length} final games loaded<br>🔁 ${h.length} takeovers<br>🏆 Leader: <b>${lead.o}</b> ${lead.p.toFixed(1)}%`;insights.innerHTML=`Current favorite: <b>${lead.o}</b><br>Alive teams: <b>${alive().length}</b>`;top.innerHTML=`<div class=card><span>Round</span><div class=big>R16</div></div><div class=card><span>Takeovers</span><div class=big>${h.length}</div></div><div class=card><span>Finals</span><div class=big>${games.filter(final).length}</div></div>`;history.innerHTML=h.map(x=>`<div class='card take'><b>🔁 ${x[0]}</b><br>${x[1]} → <b>${x[2]}</b><br><b>Spread:</b> ${x[3]}<br><b>Final:</b> ${x[4]}<br><b>Reason:</b> ${x[5]}</div>`).join('');odds.innerHTML=`<table><tr><th>Rank</th><th>Owner</th><th>Odds</th><th>Teams</th></tr>${rows.map((r,i)=>`<tr><td>#${i+1}</td><td><b>${r.o}</b></td><td><b>${r.p.toFixed(1)}%</b><div class=bar><div class=fill style='width:${r.p}%'></div></div></td><td>${r.teams.map(t=>`<span class=badge>${h.some(x=>x[0]===t)?'🔁 ':''}${t}</span>`).join('')}</td></tr>`).join('')}</table>`;owners.innerHTML=Object.entries(c).sort().map(([o,v])=>`<div class=card><b>${o}</b><br>${v.live.map(t=>`<span class=badge>${h.some(x=>x[0]===t)?'🔁 ':''}${t}</span>`).join('')}${v.out.map(t=>`<span class='badge elim'><s>${t}</s> ❌</span>`).join('')}</div>`).join('');r16.innerHTML=games.map(rcard).join('');let venue=['NRG Stadium — Houston, Texas','Lincoln Financial Field — Philadelphia, Pennsylvania','MetLife Stadium — East Rutherford, New Jersey','TBD'];qf.innerHTML=q.map((m,i)=>card(`${disp(m[0]).t} vs ${disp(m[1]).t}`,disp(m[0]),disp(m[1]),venue[i])).join('');sf.innerHTML=card(`${disp(squash(combo(q[0][0],q[0][1]))).t} vs ${disp(squash(combo(q[1][0],q[1][1]))).t}`,disp(squash(combo(q[0][0],q[0][1]))),disp(squash(combo(q[1][0],q[1][1]))),'TBD')+card(`${disp(squash(combo(q[2][0],q[2][1]))).t} vs ${disp(squash(combo(q[3][0],q[3][1]))).t}`,disp(squash(combo(q[2][0],q[2][1]))),disp(squash(combo(q[3][0],q[3][1]))),'TBD')}
render();</script></body></html>
